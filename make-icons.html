<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Generar íconos MI SISTEMA</title>
<style>body{font-family:sans-serif;padding:24px;background:#0F1419;color:#E8ECF1;}
button{background:#14B8A6;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px;margin:8px;}
canvas{display:block;margin:16px 0;border-radius:12px;}</style>
</head>
<body>
<h2>Generar íconos PWA</h2>
<p>Haz clic en cada botón para descargar el ícono correspondiente.</p>
<canvas id="c192" width="192" height="192"></canvas>
<button onclick="dl('c192','icon-192.png')">Descargar icon-192.png</button><br>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="dl('c512','icon-512.png')">Descargar icon-512.png</button><br>
<canvas id="cm512" width="512" height="512"></canvas>
<button onclick="dl('cm512','icon-maskable-512.png')">Descargar icon-maskable-512.png</button>
<script>
function drawIcon(canvas, size, maskable) {
  const ctx = canvas.getContext('2d');
  const pad = maskable ? size * 0.1 : 0;
  ctx.fillStyle = '#0F1419';
  ctx.fillRect(0, 0, size, size);
  const r = maskable ? size/2 : size * 0.15;
  ctx.beginPath();
  if (maskable) {
    ctx.rect(pad, pad, size - pad*2, size - pad*2);
  } else {
    ctx.roundRect(pad, pad, size - pad*2, size - pad*2, r);
  }
  const grad = ctx.createLinearGradient(pad, pad, size-pad, size-pad);
  grad.addColorStop(0, '#14B8A6');
  grad.addColorStop(1, '#0D9488');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#0F1419';
  ctx.font = `bold ${size * 0.42}px Inter, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', size/2, size/2 + size*0.03);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.arc(size * 0.75, size * 0.25, size * 0.22, 0, Math.PI * 2);
  ctx.fill();
}
drawIcon(document.getElementById('c192'), 192, false);
drawIcon(document.getElementById('c512'), 512, false);
drawIcon(document.getElementById('cm512'), 512, true);
function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
