ar en frasco."],macros:{proteina_g:0,calorias:0,grasas_g:0,carbos_g:0},costo_total_clp:1150,aplica_a:["al1","ce6","ce2","al9"],notas:"Dura 3 semanas en frasco. Usos: pollo teriyaki (al1), stir-fry (ce6), salmón (ce2), arroz frito (al9). Prepara siempre doble."},{id:"sa6",tipo:"salsa",nombre:"Aderezo César Light",tiempo_min:5,porciones:1,meal_prep:!0,tags:["cremosa","ensalada","light"],ingredientes:[{item:"Yogur griego natural",cantidad:"100g",costo_clp:400,cat:"lacteos"},{item:"Mostaza Dijon",cantidad:"1 cdita",costo_clp:50,cat:"extras"},{item:"Ajo",cantidad:"1 diente",costo_clp:25,cat:"especias"},{item:"Limón",cantidad:"½ unidad",costo_clp:60,cat:"extras"},{item:"Queso parmesano rallado",cantidad:"2 cdas",costo_clp:200,cat:"lacteos"},{item:"Anchoas",cantidad:"1 filete",costo_clp:100,cat:"proteinas"},{item:"Aceite de oliva",cantidad:"1 cda",costo_clp:80,cat:"grasas"},{item:"Sal, pimienta",cantidad:"al gusto",costo_clp:30,cat:"especias"}],pasos:["Mezclar todo hasta cremoso.","Refrigerar."],macros:{proteina_g:0,calorias:0,grasas_g:0,carbos_g:0},costo_total_clp:945,aplica_a:[],notas:"Dura 3-4 días en nevera. Usos: ensalada césar, pollo, vegetales. Las anchoas son la clave del sabor umami — sin ellas es salsa de yogur con queso."},{id:"sa7",tipo:"salsa",nombre:"Salsa Picante de Yogur Chipotle",tiempo_min:5,porciones:1,meal_prep:!0,tags:["picante","mexicana","cremosa"],ingredientes:[{item:"Yogur griego",cantidad:"200g",costo_clp:800,cat:"lacteos"},{item:"Pasta de ají o chipotle en polvo",cantidad:"2 cdas",costo_clp:100,cat:"especias"},{item:"Limón",cantidad:"½ unidad",costo_clp:60,cat:"extras"},{item:"Ajo",cantidad:"1 diente",costo_clp:25,cat:"especias"},{item:"Comino, sal",cantidad:"al gusto",costo_clp:25,cat:"especias"}],pasos:["Mezclar todo.","Reposar 30 min."],macros:{proteina_g:0,calorias:0,grasas_g:0,carbos_g:0},costo_total_clp:1010,aplica_a:["al2","al3","ce9","al8","ce1"],notas:"Dura 3-4 días. Usos: tacos (al2, ce9), bowls mexicanos (al3), wraps (al8), hamburguesas (ce1). Ajustar picante al gusto."}]}function renderOnboarding(){let step=0;const STEPS=[{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',title:"¿En quién te quieres convertir?",subtitle:"La identidad va antes que los resultados.",content:`\n        <p class="text-sm text-md mb-lg" style="line-height:var(--lh-relaxed)">No "quiero hacer X". Sino: "Soy alguien que..."</p>\n        <div class="field">\n          <input id="ob-identidad" class="input" placeholder="Soy alguien que..." maxlength="100" value="${esc(State.get("profile.identidad"))}">\n        </div>\n        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">\n          ${["Soy alguien con disciplina","Soy alguien que cuida su mente","Soy alguien que termina lo que empieza"].map(s=>`<button class="suggestion-chip" onclick="document.getElementById('ob-identidad').value='${s}'">${s}</button>`).join("")}\n        </div>`,save:()=>{const v=document.getElementById("ob-identidad")?.value.trim();v&&State.set("profile.identidad",v)}},{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',title:"Empezamos pequeño.",subtitle:"Tan pequeño que no puedes fallar.",content:'<p class="text-md mb-lg" style="line-height:var(--lh-relaxed);font-size:var(--fs-sm)">\n        Un hábito tarda entre 60 y 90 días en volverse automático. Empezar con 10 a la vez es fracasar en los 10.<br><br>\n        Aquí empiezas con <strong>3 hábitos núcleo</strong> en versión mínima — 2 minutos cada uno.<br><br>\n        Cuando se automatizan, escalamos.\n      </p>',save:()=>{}},{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',title:"¿Por qué importa esto para ti?",subtitle:"El por qué sostiene cuando no hay ganas.",content:`\n        <div class="field">\n          <textarea id="ob-porque" class="input" rows="4" placeholder="Porque soy migrante, porque quiero familia, porque quiero libertad...">${esc(State.get("profile.porque"))}</textarea>\n        </div>\n        <div class="field mt-md">\n          <label>Tu nombre</label>\n          <input id="ob-nombre" class="input" placeholder="¿Cómo te llamas?" value="${esc(State.get("profile.nombre"))}">\n        </div>`,save:()=>{const p=document.getElementById("ob-porque")?.value.trim(),n=document.getElementById("ob-nombre")?.value.trim();p&&State.set("profile.porque",p),n&&State.set("profile.nombre",n)}},{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',title:"Primero: 14 días de setup.",subtitle:"Antes de hábitos, fundamentos.",content:'<p class="text-sm text-md" style="line-height:var(--lh-relaxed)">\n        La Fase 0 no es gamificación. Son 14 días para arreglar lo que gamificar no puede arreglar:<br><br>\n        • P&L de tu empresa<br>\n        • Psicólogo TCC/ACT agendado<br>\n        • Accountability partner confirmado<br>\n        • Desinstalar apps distractoras<br>\n        • Baseline medido<br><br>\n        Sin esto, el sistema te mentiría.\n      </p>',save:()=>{}},{icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',title:"Tu primer check.",subtitle:"",content:'<div class="text-center" style="padding:8px 0">\n        <p class="text-sm text-md mb-lg" style="line-height:var(--lh-relaxed)">El sistema funciona cuando apareces aunque no tengas ganas.</p>\n        <div style="font-size:48px;margin:16px 0">🏗️</div>\n        <p class="text-md font-bold mb-sm">"Eso que sentiste importa."</p>\n        <p class="text-sm text-lo">Nos vemos mañana.</p>\n      </div>',save:()=>{}}];function render(){const s=STEPS[step];document.getElementById("app").innerHTML=`\n      <div class="onboarding" id="ob-screen">\n        <button class="onboarding-skip text-lo" onclick="skipOnboarding()">Saltar</button>\n        <div class="onboarding-body">\n          <div class="onboarding-icon">${s.icon}</div>\n          <div>\n            <h2>${esc(s.title)}</h2>\n            ${s.subtitle?`<p class="text-md mt-sm">${esc(s.subtitle)}</p>`:""}\n          </div>\n          <div style="width:100%">${s.content}</div>\n        </div>\n        <div class="onboarding-dots">\n          ${STEPS.map((_,i)=>`<div class="dot ${i===step?"active":""}"></div>`).join("")}\n        </div>\n        <div class="onboarding-footer stack stack-sm mt-md">\n          <button class="btn btn-primary btn-block btn-lg" id="ob-next">\n            ${step<STEPS.length-1?"Continuar":"Empezar Fase 0"}\n          </button>\n          ${step>0?'<button class="btn btn-ghost btn-block" onclick="obPrev()">Atrás</button>':""}\n        </div>\n      </div>`,document.getElementById("ob-next").onclick=obNext}window.obNext=()=>{STEPS[step].save(),step<STEPS.length-1?(step++,render()):(State.update(s=>{s.onboarding_done=!0,s.fase0_checklist.dia_inicio=todayISO()}),UI.confetti(50),setTimeout(()=>Router.navigate("fase0"),600))},window.obPrev=()=>{step>0&&(step--,render())},window.skipOnboarding=()=>{State.update(s=>{s.onboarding_done=!0,s.fase0_checklist.dia_inicio||(s.fase0_checklist.dia_inicio=todayISO())}),Router.navigate("fase0")},render()}function renderFase0(){const s=State.get(),cl=s.fase0_checklist,nombre=s.profile.nombre||"Aquí",diasInicio=cl.dia_inicio?Math.floor((Date.now()-new Date(cl.dia_inicio+"T00:00:00").getTime())/864e5)+1:1,diasRestantes=Math.max(0,14-diasInicio+1),doneItems=[cl.pnl_vant_completo,cl.psicologo_agendado,cl.accountability_partner_confirmado,cl.yt_desinstalado,cl.ig_desinstalado,cl.clash_desinstalado,cl.grayscale_activado,cl.app_blocker_instalado,cl.baseline_medido].filter(Boolean).length,allDone=9===doneItems,pct=Math.round(doneItems/9*100),showStall=diasInicio>=7&&doneItems<3;document.getElementById("app").innerHTML=`\n    <div class="page">\n      <div style="padding-top:8px">\n        <p class="text-sm text-lo font-semibold uppercase" style="letter-spacing:.08em">FASE 0 — SETUP</p>\n        <h2 class="mt-sm">${nombre?`Hola, ${esc(nombre)}.`:"Setup del sistema"}</h2>\n        <p class="text-sm text-md mt-sm" style="line-height:var(--lh-relaxed)">14 días para construir la base. Sin esto, gamificar sería mentirte.</p>\n      </div>\n\n      <div class="fase0-counter mt-lg">\n        <div class="fase0-counter-num num">${diasInicio<14?diasInicio:"14"}<span style="font-size:var(--fs-xl);color:var(--text-lo)">/14</span></div>\n        <div class="fase0-counter-label">Día actual · ${diasRestantes} día${1!==diasRestantes?"s":""} restante${1!==diasRestantes?"s":""}</div>\n        <div class="progress-bar progress-thin mt-md"><div class="progress-fill" style="width:${pct}%"></div></div>\n        <div class="text-xs text-lo mt-sm">${doneItems}/9 tareas completadas</div>\n      </div>\n\n      ${showStall?'<div class="banner banner-warn">\n        Llevas una semana en Fase 0 sin mover el checklist. Sin estos pasos, gamificar esto es mentirte. ¿Qué te está frenando?\n        <textarea class="input mt-sm" placeholder="Escribe aquí..." id="stall-text" style="min-height:60px"></textarea>\n        <button class="btn btn-sm btn-secondary mt-sm" onclick="saveStallNote()">Guardar</button>\n      </div>':""}\n\n      ${allDone?'<div class="banner banner-comeback mt-md">\n        ¡Checklist completo! Los fundamentos están listos. Bienvenido a Fase 1.\n        <button class="btn btn-primary btn-block mt-md" onclick="unlockFase1()">Desbloquear Fase 1</button>\n      </div>':""}\n\n      <div class="section mt-lg">\n        <div class="section-title">Checklist</div>\n        <div class="car \x3c!-- 3. Partner --\x3e\n          <div class="fase0-item">\n            <div class="fase0-num ${cl.accountability_partner_confirmado?"done":""}">3</div>\n            <div class="fase0-content">\n              <div class="fase0-label">Tu persona de apoyo semanal</div>\n              <div class="fase0-sub">Alguien que sepa lo que te propones y a quien le reportes cada semana (15 min). Puede ser un amigo, familiar, o compañero. Reportar a alguien aumenta el logro de metas significativamente.</div>\n              ${cl.accountability_partner_confirmado?`<span class="chip chip-success mt-sm">Confirmado: ${esc(s.settings.accountability_partner.nombre)}</span>`:`<div class="field mt-sm">\n                    <input id="partner-nombre" class="input" placeholder="Nombre de tu persona de apoyo" value="${esc(s.settings.accountability_partner.nombre)}">\n                    <input id="partner-contacto" class="input mt-sm" placeholder="WhatsApp / email" value="${esc(s.settings.accountability_partner.contacto)}">\n                    <button class="btn btn-sm btn-secondary mt-sm" onclick="savePartner()">Confirmar</button>\n                  </div>`}\n            </div>\n          </div>\n\n          \x3c!-- 4-6. Apps --\x3e\n          <div class="fase0-item">\n            <div class="fase0-num ${cl.yt_desinstalado&&cl.ig_desinstalado&&cl.clash_desinstalado?"done":""}">4</div>\n            <div class="fase0-content">\n              <div class="fase0-label">Desinstalar apps distractoras</div>\n              <div class="fase0-sub">El celular cerca distrae aunque esté apagado. Desinstálalas por 30 días para ganar foco. Si las necesitas, úsalas solo desde el computador.</div>\n              <div class="stack stack-sm mt-sm">\n                ${[["yt_desinstalado","YouTube"],["ig_desinstalado","Instagram"],["clash_desinstalado","Clash of Clans"]].map(([key,label])=>`\n                  <label class="toggle">\n                    <input type="checkbox" ${cl[key]?"checked":""} onchange <script>
"use strict";
/* ═══════════════════════════════════════════════════════════════════
   MÓDULO: Notion Sync + hábitos Fitia/Gravl (parche aditivo v1)
   - Notion = base de datos (roadmap de metas, archivo diario)
   - La app = capa de juego. Fitia y Gravl siguen siendo los registradores;
     aquí solo queda el ✓ diario de cada uno.
   Flujo: app → data/daily/*.json (GitHub API) → Action → Notion
          Notion → Action → data/roadmap.json → app (tab Metas)
   ═══════════════════════════════════════════════════════════════════ */
(() => {
  const TOKEN_KEY = "misistema.ghtoken"; // fuera del estado: no entra en backups
  const NS_DEFAULTS = { owner: "jlyp29", repo: "jorge-app", branch: "main", auto: true, fx_clp_usd: 950, last_sync: null, last_status: "", last_hash: "" };

  const cfg = () => Object.assign({}, NS_DEFAULTS, State.get().notion_sync || {});
  function setCfg(k, v) { State.update(s => { s.notion_sync = Object.assign({}, NS_DEFAULTS, s.notion_sync || {}); s.notion_sync[k] = v; }); }

  /* ── Migración: hábitos de 1 toque para Fitia y Gravl ── */
  function ensureFitiaGravl() {
    const s0 = State.get();
    if (s0.__fitia_gravl_v) return;
    State.update(s => {
      if (!(s.habits || []).find(h => h.id === "h10")) {
        s.habits.push({ id: "h10", nombre: "Comidas en Fitia", tipo: "salud", anchor: "Después de cenar", escala_actual: "tiny",
          version_tiny: "Registrar al menos el almuerzo en Fitia", version_target: "Las 3 comidas del día registradas en Fitia",
          identity_tag: "Soy alguien que sabe lo que come", xp_por_check: 15, cue_ubicacion: "teléfono",
          completions: [], tiny_completions: [], freeze_completions: [], currentStreak: 0, longestStreak: 0, scale_history: [],
          createdAt: Date.now(), updatedAt: Date.now() });
      }
      const h3 = (s.habits || []).find(h => h.id === "h3");
      if (h3 && h3.nombre === "Entrenamiento") { h3.nombre = "Entrenamiento (Gravl)"; h3.version_target = "Sesión Gravl completada en el gym"; }
      const bl = s.agenda && s.agenda.bloques;
      if (bl) {
        if (!bl.find(b => b.id === "ag13")) bl.push({ id: "ag13", hora: "21:45", titulo: "Cierre Fitia del día", tipo: "rutina", icono: "🥗", habit_id: "h10", dias: "diario", recordar: true });
        const ag6 = bl.find(b => b.id === "ag6");
        if (ag6 && ag6.titulo === "Entrenamiento") ag6.titulo = "Entrenamiento (Gravl)";
      }
      s.__fitia_gravl_v = 1;
    });
  }

  /* ── Resumen del día para Notion ── */
  function buildSummary() {
    const s = State.get(), t = todayISO(), mes = monthStr();
    const habs = s.habits || [];
    const done = h => (h.completions || []).includes(t) || (h.tiny_completions || []).includes(t);
    const md = ((s.vant && s.vant.mensual) || []).find(m => m.mes === mes);
    let mejor = 0;
    habs.forEach(h => { try { const ls = calcLiveStreak(h.completions || [], h.freeze_completions || []); if (ls > mejor) mejor = ls; } catch (e) {} });
    const wins = (s.small_wins || []).filter(w => w.fecha === t).flatMap(w => (w.wins || []).map(x => x.txt)).slice(0, 3);
    const hF = habs.find(x => x.id === "h10"), hG = habs.find(x => x.id === "h3");
    return {
      fecha: t,
      xp_dia: ((s.xp && s.xp.history) || []).filter(e => e.fecha === t).reduce((a, e) => a + (e.delta || 0), 0),
      xp_total: (s.xp && s.xp.total) || 0,
      nivel: (s.xp && s.xp.nivel) || 1,
      habitos_completados: habs.filter(done).length,
      habitos_totales: habs.length,
      mejor_racha: mejor,
      fitia: !!(hF && done(hF)),
      gravl: !!(hG && done(hG)),
      outreach: ((s.vant && s.vant.outputs_log) || []).filter(o => o.fecha === t && o.tipo === "outreach").length,
      ingresos_mes_clp: md ? vantIngresoMes(md) : 0,
      notas: wins.join(" · ")
    };
  }

  /* ── GitHub API (soporta CORS desde el navegador) ── */
  const b64 = str => btoa(unescape(encodeURIComponent(str)));
  function ghFetch(url, opts, token) {
    return fetch(url, Object.assign({}, opts || {}, {
      headers: Object.assign({ Accept: "application/vnd.github+json", Authorization: "Bearer " + token, "X-GitHub-Api-Version": "2022-11-28" }, (opts && opts.headers) || {})
    }));
  }

  async function syncNow(manual) {
    const c = cfg(), token = localStorage.getItem(TOKEN_KEY) || "";
    if (!token) { if (manual) UI.toast("Falta el token de GitHub — configúralo abajo en esta sección.", "warn", 5000); return; }
    const sum = buildSummary();
    const hash = JSON.stringify(sum);
    if (!manual && hash === c.last_hash) return; // nada nuevo que subir
    const apiBase = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/data/daily/${sum.fecha}.json`;
    try {
      let sha;
      const g = await ghFetch(apiBase + "?ref=" + encodeURIComponent(c.branch), {}, token);
      if (g.status === 200) sha = (await g.json()).sha;
      else if (g.status !== 404) throw new Error("GitHub " + g.status);
      const body = { message: "app: registro diario " + sum.fecha, branch: c.branch,
        content: b64(JSON.stringify(Object.assign({}, sum, { generado: new Date().toISOString() }), null, 2)) };
      if (sha) body.sha = sha;
      const p = await ghFetch(apiBase, { method: "PUT", body: JSON.stringify(body) }, token);
      if (!p.ok) { const d = await p.json().catch(() => ({})); throw new Error("GitHub " + p.status + (d.message ? ": " + d.message : "")); }
      State.update(s => { s.notion_sync = Object.assign({}, NS_DEFAULTS, s.notion_sync || {}, { last_sync: new Date().toISOString(), last_status: "ok", last_hash: hash }); });
      if (manual) UI.toast("☁️ Día subido — Notion se actualiza en ~1 min", "success");
    } catch (err) {
      State.update(s => { s.notion_sync = Object.assign({}, NS_DEFAULTS, s.notion_sync || {}, { last_status: "error: " + err.message }); });
      if (manual) UI.toast("Sync falló: " + err.message, "warn", 6000);
    }
    refreshStatus();
  }

  function saveToken() {
    const el = document.getElementById("ns-token");
    if (!el) return;
    const v = el.value.trim();
    if (!v) { UI.toast("Pega el token primero", "warn"); return; }
    localStorage.setItem(TOKEN_KEY, v);
    el.value = ""; el.placeholder = "••••••••  (guardado)";
    UI.toast("Token guardado solo en este dispositivo", "success");
    refreshStatus();
  }

  async function testConn() {
    const c = cfg(), token = localStorage.getItem(TOKEN_KEY) || "";
    if (!token) { UI.toast("Primero guarda el token", "warn"); return; }
    try {
      const r = await ghFetch(`https://api.github.com/repos/${c.owner}/${c.repo}`, {}, token);
      if (!r.ok) throw new Error("HTTP " + r.status);
      UI.toast("✅ Conexión OK con " + c.owner + "/" + c.repo, "success");
    } catch (e) { UI.toast("Sin conexión: " + e.message, "warn", 6000); }
  }

  function statusLine() {
    const c = cfg();
    if (!localStorage.getItem(TOKEN_KEY)) return "Sin configurar — sigue los pasos de abajo.";
    if (!c.last_sync) return "Token listo. Aún no se ha sincronizado.";
    const st = c.last_status === "ok" ? "✅" : "⚠️ " + c.last_status;
    return `Última sincronización: ${new Date(c.last_sync).toLocaleString("es-CL")} ${st}`;
  }
  function refreshStatus() { const el = document.getElementById("ns-status"); if (el) el.textContent = statusLine(); }

  /* ── Roadmap desde Notion (data/roadmap.json, lo regenera la Action) ── */
  let _rm = null;
  async function loadRoadmap(force) {
    if (_rm && !force) return _rm;
    const r = await fetch("data/roadmap.json", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    _rm = await r.json();
    return _rm;
  }

  const HOR = {
    Corto: { color: "var(--success)", glow: "var(--success-glow)", label: "🟢 Corto plazo" },
    Mediano: { color: "var(--accent)", glow: "var(--accent-glow)", label: "🟡 Mediano plazo · USD 3.000" },
    Largo: { color: "var(--identity)", glow: "var(--identity-glow)", label: "🟣 Largo plazo · USD 7.000" }
  };
  const EST = { "Lograda": "var(--success)", "En curso": "var(--primary)", "Pendiente": "var(--text-lo)" };

  function metasHTML(data) {
    const s = State.get(), mes = monthStr();
    const md = ((s.vant && s.vant.mensual) || []).find(m => m.mes === mes);
    const ing = md ? vantIngresoMes(md) : 0;
    const fx = cfg().fx_clp_usd || 950, usd = ing / fx;
    const fmtCLP = n => "$" + Math.round(n).toLocaleString("es-CL");
    const fmtUSD = n => "US$" + Math.round(n).toLocaleString("es-CL");
    const metas = (data.metas || []).slice().sort((a, b) => (a.orden || 999) - (b.orden || 999));
    const gen = data.generated ? new Date(data.generated).toLocaleDateString("es-CL", { day: "numeric", month: "short" }) : "—";

    let html = `
      <div class="card mb-md" style="padding:16px;border:1.5px solid var(--primary)">
        <div class="text-xs text-lo font-semibold uppercase mb-sm">Este mes (Vant + servicios)</div>
        <div class="font-semibold num" style="font-size:var(--fs-xl)">${fmtCLP(ing)}</div>
        <div class="text-sm text-md">≈ ${fmtUSD(usd)} <span class="text-xs text-lo">(tipo de cambio ${fx} — se ajusta en Ajustes)</span></div>
        <div class="text-xs text-lo mt-sm">Fuente de metas: Notion · actualizado ${gen}</div>
      </div>`;

    ["Corto", "Mediano", "Largo"].forEach(h => {
      const grupo = metas.filter(m => m.horizonte === h);
      if (!grupo.length) return;
      const H = HOR[h];
      html += `<div class="section-title" style="color:${H.color}">${H.label}</div>`;
      grupo.forEach(m => {
        const estC = EST[m.estado] || "var(--text-lo)";
        let barra = "";
        if (m.meta_usd) {
          const pct = Math.max(0, Math.min(100, Math.round(usd / m.meta_usd * 100)));
          barra = `
            <div class="mt-sm" style="height:8px;background:var(--bg-3);border-radius:4px;overflow:hidden">
              <div style="width:${pct}%;height:8px;background:${H.color};border-radius:4px"></div>
            </div>
            <div class="text-xs text-lo mt-sm num">${fmtUSD(usd)} / ${fmtUSD(m.meta_usd)} · ${pct}%</div>`;
        }
        html += `
          <div class="card mb-md" style="padding:14px">
            <div class="row-between">
              <div class="font-semibold text-sm" style="flex:1;padding-right:8px">${esc(m.meta)}</div>
              <span class="text-xs" style="color:${estC};white-space:nowrap">● ${esc(m.estado)}</span>
            </div>
            ${m.fecha_objetivo ? `<div class="text-xs text-lo mt-sm">🗓 ${esc(m.fecha_objetivo)}</div>` : ""}
            ${m.metrica ? `<div class="text-xs text-md mt-sm">🎯 ${esc(m.metrica)}</div>` : ""}
            ${barra}
          </div>`;
      });
    });
    html += `<div class="text-xs text-lo mb-md" style="text-align:center">Las metas se editan en Notion → "🎯 Roadmap — Metas". La app las refleja.</div>`;
    return `<div class="section">${html}</div>`;
  }

  function renderMetasInto(body) {
    body.innerHTML = `<div class="section"><div class="card" style="padding:16px"><div class="text-sm text-md">Cargando metas desde Notion…</div></div></div>`;
    loadRoadmap(true).then(data => { body.innerHTML = metasHTML(data); }).catch(() => {
      body.innerHTML = `<div class="section"><div class="card" style="padding:16px">
        <div class="font-semibold mb-sm">Aún no llegan las metas de Notion</div>
        <div class="text-sm text-md">Cuando la sincronización esté configurada (Ajustes → Sync Notion) y corra la primera vez, aquí vas a ver tu roadmap: corto y mediano plazo hasta <b>US$3.000/mes</b> y largo plazo <b>US$7.000/mes</b>, con barras de progreso según tu ingreso real del mes.</div>
      </div></div>`;
    });
  }

  /* ── Tab "Metas" dentro de Resultados (y ruta #roadmap) ── */
  const _origRenderResultados = renderResultados;
  renderResultados = function (tab = "resumen") {
    const isMetas = tab === "metas" || tab === "roadmap";
    _origRenderResultados(isMetas ? "resumen" : tab);
    const tabs = document.querySelector(".journal-tabs");
    if (tabs && !tabs.querySelector("[data-tab-metas]")) {
      const b = document.createElement("button");
      b.className = "journal-tab"; b.dataset.tabMetas = "1"; b.textContent = "Metas";
      b.onclick = () => renderResultados("metas");
      tabs.appendChild(b);
    }
    if (tabs && isMetas) {
      tabs.querySelectorAll(".journal-tab").forEach(x => x.classList.toggle("active", !!x.dataset.tabMetas));
    }
    if (isMetas) { const body = document.getElementById("resultados-body"); if (body) renderMetasInto(body); }
  };

  /* ── Sección en Ajustes ── */
  const _origRenderAjustes = renderAjustes;
  renderAjustes = function () {
    _origRenderAjustes();
    const page = document.querySelector("#app .page");
    if (!page || document.getElementById("ns-section")) return;
    const c = cfg(), tok = localStorage.getItem(TOKEN_KEY) || "";
    const div = document.createElement("div");
    div.className = "section"; div.id = "ns-section";
    div.innerHTML = `
      <div class="section-title">☁️ Sync Notion</div>
      <div class="card" style="padding:14px">
        <div class="settings-row">
          <div class="settings-row-info">
            <div class="settings-row-label">Sincronización automática</div>
            <div class="settings-row-sub">Sube tu día al abrir y al cerrar la app</div>
          </div>
          <label class="toggle">
            <input type="checkbox" ${c.auto ? "checked" : ""} onchange="NotionSync.setCfg('auto',this.checked)">
            <div class="toggle-track"><div class="toggle-thumb"></div></div>
          </label>
        </div>
        <div class="text-xs text-lo mb-sm" style="margin-top:10px">Token de GitHub (fine-grained, solo este repo)</div>
        <input id="ns-token" class="input" type="password" autocomplete="off" placeholder="${tok ? "••••••••  (guardado)" : "github_pat_…"}">
        <div class="text-xs text-lo mt-sm">Se guarda solo en este dispositivo. No entra en los backups.</div>
        <div class="text-xs text-lo mt-md mb-sm">Tipo de cambio CLP → USD (para las barras de metas)</div>
        <input id="ns-fx" class="input" type="number" inputmode="numeric" value="${c.fx_clp_usd}" onchange="NotionSync.setCfg('fx_clp_usd',Math.max(1,+this.value||950))">
        <button class="btn btn-secondary btn-block" style="margin-top:12px" onclick="NotionSync.saveToken()">Guardar token</button>
        <button class="btn btn-secondary btn-block mt-sm" onclick="NotionSync.testConn()">Probar conexión</button>
        <button class="btn btn-primary btn-block mt-sm" onclick="NotionSync.syncNow(true)">Sincronizar ahora</button>
        <div id="ns-status" class="text-xs text-lo mt-sm">${statusLine()}</div>
        <details style="margin-top:12px">
          <summary class="text-xs text-lo" style="cursor:pointer">¿Cómo se configura? (una sola vez, ~5 min)</summary>
          <div class="text-xs text-md mt-sm" style="line-height:1.7">
            <b>1.</b> GitHub → Settings → Developer settings → Fine-grained personal access tokens → Generate new. Repository access: solo <b>jlyp29/jorge-app</b>. Permissions → Contents: <b>Read and write</b>. Copia el token y pégalo arriba.<br>
            <b>2.</b> Notion → notion.so/profile/integrations → New integration (interna, tu workspace). Copia el "Internal Integration Secret".<br>
            <b>3.</b> En Notion abre la página <b>"🎮 Mi Sistema — App ↔ Notion (Sync)"</b> → menú ⋯ → Conexiones → agrega tu integración.<br>
            <b>4.</b> En GitHub: repo → Settings → Secrets and variables → Actions → New repository secret: nombre <b>NOTION_TOKEN</b>, valor el secret de Notion.<br>
            Listo: la app sube tu día, GitHub lo pasa a Notion y baja las metas del roadmap. Guía completa en <b>SETUP-NOTION.md</b>.
          </div>
        </details>
      </div>`;
    const sections = page.querySelectorAll(".section");
    if (sections[0]) sections[0].after(div); else page.appendChild(div);
  };

  /* ── API pública + arranque ── */
  window.NotionSync = { setCfg, saveToken, testConn, syncNow, loadRoadmap };

  try { ensureFitiaGravl(); } catch (e) { console.warn("Migración Fitia/Gravl falló:", e); }
  setTimeout(() => { if (cfg().auto) { try { syncNow(false); } catch (e) {} } }, 3000);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden" && cfg().auto) { try { syncNow(false); } catch (e) {} }
  });
})();

</script></body></html>
