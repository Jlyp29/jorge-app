            return `<div class="card" style="padding:10px 14px">
              <div class="row-between">
                <span class="text-sm font-semibold">${mn}</span>
                <div class="row row-gap-sm">
                  <span class="chip ${ok?'chip-identity':'chip-warn'}">${tasa}% ahorrado</span>
                  <span class="text-sm text-lo">${fmt(ah)}</span>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

      <!-- Meta de ahorro -->
      <div class="section">
        <div class="section-title">Configuración</div>
        <div class="card">
          <div class="row-between">
            <div>
              <div class="text-sm font-semibold">Meta de ahorro mensual</div>
              <div class="text-xs text-lo mt-sm">Porcentaje del ingreso que quieres ahorrar</div>
            </div>
            <button class="btn btn-sm btn-ghost" onclick="editarMetaAhorro()">${metaPct}% →</button>
          </div>
        </div>
      </div>

    </div>`;

  window.editarMesFinanzas = () => {
    const s = State.get();
    const mes = monthStr();
    const mesDat = s.finanzas.mensual.find(m => m.mes === mes) || {};
    UI.modal({
      title: `Datos de ${new Date().toLocaleDateString('es-CL',{month:'long',year:'numeric'})}`,
      body: `
        <div class="stack stack-md">
          <div class="field">
            <label>Ingreso total del mes (CLP)</label>
            <div class="input-group">
              <span class="input-prefix" style="font-size:11px">$</span>
              <input id="fin-ingreso" class="input input-prefixed num" type="number" placeholder="ej. 1200000" value="${mesDat.ingreso_clp || ''}">
            </div>
            <div class="hint">Todo lo que entró: sueldo, Sinergy, ML, cualquier fuente</div>
          </div>
          <div class="field">
            <label>Gastos variables del mes (CLP)</label>
            <div class="input-group">
              <span class="input-prefix" style="font-size:11px">$</span>
              <input id="fin-variables" class="input input-prefixed num" type="number" placeholder="ej. 400000" value="${mesDat.gastos_variables_clp || ''}">
            </div>
            <div class="hint">Comida, transporte, salidas, imprevistos — lo que no es fijo</div>
          </div>
          <div class="field">
            <label>Nota del mes (opcional)</label>
            <input id="fin-notas" class="input" placeholder="ej. Mes con gasto extra en equipamiento" value="${esc(mesDat.notas || '')}">
          </div>
        </div>`,
      actions: [
        { label: 'Guardar', action: () => {
          const ingreso = parseInt(document.getElementById('fin-ingreso')?.value) || 0;
          const variables = parseInt(document.getElementById('fin-variables')?.value) || 0;
          const notas = document.getElementById('fin-notas')?.value.trim() || '';
          if (!ingreso) { UI.toast('Ingresa al menos el ingreso del mes.', 'warn'); return false; }
          const isNew = !State.get().finanzas.mensual.find(m => m.mes === mes);
          State.update(s => {
            const idx = s.finanzas.mensual.findIndex(m => m.mes === mes);
            const entry = { mes, ingreso_clp: ingreso, gastos_variables_clp: variables, notas };
            if (idx >= 0) s.finanzas.mensual[idx] = entry;
            else s.finanzas.mensual.unshift(entry);
          });
          if (isNew) XP.add(20, 'Finanzas del mes registradas');
          UI.toast('Guardado.', 'success');
          renderFinanzas();

        { label: 'Cancelar', action: () => {} },

    });
  };

          UI.toast('Meta actualizada.', 'success');
          renderFinanzas();
        }},
        { label: 'Cancelar', action: () => {} },
      ],
    });
  };
}

    const text = document.getElementById('checkin-preview')?.textContent||'';
    navigator.clipboard?.writeText(text).then(()=>UI.toast('Copiado al portapapeles.','success')).catch(()=>UI.toast('Selecciona y copia manualmente.','warn'));
  };
  window.registrarCheckin = () => {
    const semana = weekISO();
    State.update(s => {
      if (!s.accountability_checkins.find(c => c.semana_iso === semana)) {
        s.accountability_checkins.unshift({ semana_iso: semana, fecha: todayISO(), cumplidos });
      }
    });
    XP.add(20, 'Check-in semanal con partner');
    UI.toast('Check-in registrado. +20 XP 🤝','success');
    renderPartner();
  };
}

function generateCheckinTemplate(s, cumplidos) {
  const semana = new Date().toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});
  return `Hola ${s.settings.accountability_partner.nombre||'partner'}, check-in semanal (${semana}):

Para la próxima semana me comprometo a:
1.
2.
3.

Estado emocional: /10
Notas: `;
}

/* ═══════════════════════════════════════════════════════════
   THEME & UTILS
═══════════════════════════════════════════════════════════ */
function applyTheme(t) {
  const html = document.documentElement;
  if (t === 'auto') {
    const pref = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    html.setAttribute('data-theme', pref);
  } else {
    html.setAttribute('data-theme', t);
  }
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = t === 'light' ? '#FAFAF7' : '#0F1419';
}

/* ═══════════════════════════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════════════════════════ */
const Notifs = (() => {
  function schedule() {
    const s = State.get();
    if (!s.settings.notificaciones_activas) return;
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    const tomorrow8 = new Date(now); tomorrow8.setDate(tomorrow8.getDate()+1); tomorrow8.setHours(8,0,0,0);
    const tonight22 = new Date(now); tonight22.setHours(22,0,0,0);
    const nombre = s.profile.nombre || '';

    if (tonight22 > now) {
      const ms = tonight22.getTime() - now.getTime();
      setTimeout(() => {
        const yStr = (() => { const d = new Date(); d.setDate(d.getDate()-1); return dateStr(d); })();
        const allDoneToday = s.habits.every(h => h.completions.includes(today()));
        if (!allDoneToday) send('MI SISTEMA', 'Sueño es la meta 12% empezando. Cierra y sube.', { tag:'bedtime' });
      }, Math.min(ms, 2147483647));
    }

    // Comeback
    const anoche = s.habits.some(h => { const d = new Date(); d.setDate(d.getDate()-1); return !h.completions.includes(dateStr(d)); });
    if (anoche && tomorrow8 > now) {
      const ms = tomorrow8.getTime() - now.getTime();
      setTimeout(() => send('MI SISTEMA', 'Ayer se pasó. Hoy está aquí. Versión mínima cuenta.', { tag:'comeback' }), Math.min(ms, 2147483647));
    }
  }

  function send(title, body, opts = {}) {
    try { new Notification(title, { body, icon:'./icon-192.png', badge:'./icon-192.png', ...opts }); } catch(e) {}
  }

  return { schedule, send };
})();

/* ═══════════════════════════════════════════════════════════
   APP INIT
═══════════════════════════════════════════════════════════ */
const App = (() => {
  function registerRoutes() {
    Router.register('onboarding', () => renderOnboarding());
    Router.register('fase0', () => renderFase0());
    Router.register('hoy', () => { renderNav(); renderHoy(); });
    Router.register('habitos', () => { renderNav(); renderHabitos(); });
    Router.register('cuerpo', () => { renderNav(); renderCuerpo(); });
    Router.register('sinergy', () => { renderNav(); renderSinergy(); });
    Router.register('diario', () => { renderNav(); renderDiario(); });
    Router.register('yo', () => { renderNav(); renderYo(); });
    Router.register('protocolos', () => { renderNav(); renderProtocolos(); });
    Router.register('protocolo', (hash) => { renderNav(); const id = hash.split('/')[1]; renderProtocolo(id); });
    Router.register('partner', () => { renderNav(); renderPartner(); });
    Router.register('experimentos', () => { renderNav(); renderExperimentos(); });
    Router.register('insights', () => { renderNav(); renderInsights(); });
    Router.register('ajustes', () => { renderNav(); renderAjustes(); });
    Router.register('finanzas', () => { renderNav(); renderFinanzas(); });
    Router.register('crisis', () => renderCrisis());
  }

  function registerSW() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW error:', e));
    }
  }

  function checkDailyComebackFlag() {
    const s = State.get();
    const yStr = (() => { const d = new Date(); d.setDate(d.getDate()-1); return dateStr(d); })();
    const failedYesterday = s.habits.some(h => !h.completions.includes(yStr));
    if (failedYesterday && !s.xp.comeback_pendiente) {
      State.set('xp.comeback_pendiente', true);
    }
  }

  function init() {
    State.load();
    XP.checkMonthReset();
    checkDailyComebackFlag();
    applyTheme(State.get('settings.theme') || 'dark');
    registerRoutes();
    Router.init();
    registerSW();
    Notifs.schedule();
    // Run insights if enough data
    const diasSistema = State.get('settings.fase_start')
      ? Math.floor((Date.now() - new Date(State.get('settings.fase_start')+'T00:00:00').getTime())/86400000)+1 : 0;
    if (diasSistema >= 21) InsightsEngine.generate();
    // Auto theme media listener
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
      if (State.get('settings.theme') === 'auto') applyTheme('auto');
    });
    // Initialize Web Audio on first user gesture
    document.addEventListener('click', () => { UI.playSound && State.get('settings.sonido'); }, { once: true });
  }

  return { init };
})();

// Esperar a que Chart.js cargue (async), luego arrancar
if (typeof Chart !== 'undefined') {
  App.init();
} else {
  const chartScript = document.querySelector('script[src*="chart.js"]');
  if (chartScript) {
    chartScript.addEventListener('load', () => App.init());
    chartScript.addEventListener('error', () => App.init()); // arrancar igual si falla CDN
  } else {
    App.init();
  }
}
</script>
