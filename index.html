function renderJournalPennebaker(body, s) {
  const PENNEBAKER_COPY = `Escribe sobre lo más profundo que te pesa ahora mismo. Sin filtro. Sin preocuparte por gramática. Durante 15-20 min seguidos. Nadie lo lee.`;
  const sessions = s.protocols_log.filter(p => p.protocolo === 'pennebaker');
  body.innerHTML = `
    <div class="card mb-md">
      <p class="text-sm text-md" style="line-height:var(--lh-relaxed)">${esc(PENNEBAKER_COPY)}</p>
      <p class="text-xs text-lo mt-sm">4 días seguidos, 15-20 min. La investigación muestra que reduce el estrés y mejora el bienestar.</p>
    </div>
    <div class="field mb-md">
      <label>¿Cuántos minutos? <span id="p-min-val">15</span></label>
      <input type="range" id="p-dur" min="15" max="20" value="15" style="width:100%;margin-top:6px" oninput="document.getElementById('p-min-val').textContent=this.value">
    </div>
    <button class="btn btn-primary btn-block" onclick="startPennebaker()">Comenzar sesión</button>
    ${sessions.length ? `<div class="mt-lg section-title">Sesiones completadas: ${sessions.length}</div>` : ''}`;

  window.startPennebaker = () => {
    const min = parseInt(document.getElementById('p-dur')?.value)||15;
    UI.modal({
      title: `Escritura libre · ${min} minutos`,
      body: `
        <div class="timer-circle mb-md" id="penn-timer">
          <svg width="120" height="120"><circle class="timer-circle-track" cx="60" cy="60" r="52"/><circle class="timer-circle-fill" id="penn-fill" cx="60" cy="60" r="52" stroke-dasharray="${2*Math.PI*52}" stroke-dashoffset="0"/></svg>
          <div class="timer-text" id="penn-time">${min}:00</div>
        </div>
        <textarea id="penn-text" class="input" rows="8" placeholder="Escribe sin filtro..." spellcheck="false" style="font-size:var(--fs-sm)"></textarea>`,
      actions:[
        { label:'Guardar entrada', cls:'btn-primary btn-block', action:() => {
          const text = document.getElementById('penn-text')?.value || '';
          State.update(s => {
            s.protocols_log.unshift({ fecha:todayISO(), protocolo:'pennebaker', duracion_min:min, payload:{}, resultado_subjetivo_1_5:3 });
            if (text.length > 10) s.journal.push({ id:Date.now().toString(), fecha:todayISO(), tipo:'pennebaker', payload:{texto:text}, tags:[] });
          });
          XP.add(40,'Escritura expresiva');
          UI.toast('Sesión completada. +40 XP','success');
          renderDiario('pennebaker');
        }},
        { label:'Destruir sin guardar', cls:'btn-danger btn-block', action:() => {
          State.update(s => { s.protocols_log.unshift({ fecha:todayISO(), protocolo:'pennebaker', duracion_min:min, payload:{}, resultado_subjetivo_1_5:3 }); });
          XP.add(40,'Escritura expresiva');
          UI.toast('+40 XP. Lo que se fue, se fue.','success');
          renderDiario('pennebaker');
        }},
      ],
    });
    let secs = min * 60;
    const circ = 2 * Math.PI * 52;
    const iv = setInterval(() => {
      secs--;
      const fill = document.getElementById('penn-fill');
      const time = document.getElementById('penn-time');
      if (!fill || !time) { clearInterval(iv); return; }
      const progress = 1 - secs / (min*60);
      fill.style.strokeDashoffset = circ * (1 - progress);
      const m = Math.floor(secs/60), s2 = secs%60;
      time.textContent = `${m}:${String(s2).padStart(2,'0')}`;
      if (secs <= 0) { clearInterval(iv); UI.haptic([30,50,30]); }
    }, 1000);
  };
}

      ${Array.from({length: META}, (_,i) => `
        <button onclick="toggleVaso(${i+1})" style="
          aspect-ratio:1;border-radius:16px;border:2px solid ${i < vasos ? 'var(--primary)' : 'var(--border)'};
          background:${i < vasos ? 'var(--primary-alpha)' : 'transparent'};

    State.update(s => {
      if (!s.fisico.agua) s.fisico.agua = {};
      const actual = s.fisico.agua[hoy] || 0;
      s.fisico.agua[hoy] = Math.max(0, Math.min(META, actual + delta));
    });
    renderCuerpo('agua');
  };
  window.toggleVaso = (n) => {
    State.update(s => {
      if (!s.fisico.agua) s.fisico.agua = {};
      s.fisico.agua[hoy] = n;
    });
    renderCuerpo('agua');
  };
}

/* ═══════════════════════════════════════════════════════════
   PROGRESO 5 AÑOS
═══════════════════════════════════════════════════════════ */
function calcProgresoPct(inicio, actual, meta) {
  if (inicio === meta) return actual <= meta ? 100 : 0;
  // Para grasa: menor es mejor. Para ingreso: mayor es mejor.
  const dir = meta < inicio ? -1 : 1;
  const total = Math.abs(meta - inicio);
  const avance = dir * (actual - inicio);
  return Math.min(100, Math.max(0, Math.round(avance / total * 100)));
}

function areaProgressHTML(label, inicio, actual, meta, unidad, color) {
  const pct = actual !== null ? calcProgresoPct(inicio, actual, meta) : 0;
  const sinDato = actual === null;
  return `<div class="area-progress">
    <div class="row-between">
      <span class="area-label">${label}</span>
      <span class="area-pct" style="color:${color}">${sinDato ? '—' : pct + '%'}</span>
    </div>
    <div class="area-progress-bar">
      <div class="area-progress-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="area-vals">${sinDato ? 'Sin datos aún' : `${unidad === 'pct-inv' ? actual+'%' : (unidad === 'usd' ? '$'+actual.toLocaleString('es-CL') : actual+' '+unidad)} · meta ${unidad === 'pct-inv' ? meta+'%' : (unidad === 'usd' ? '$'+meta.toLocaleString('es-CL') : meta+' '+unidad)}`}</div>

  const ingresoInicio = 2200;
  const ingresoAnio1  = m.ingreso_anio_1 || 3500;

  // Adherencia: promedio 30d calculado
  const adh30 = (() => {
    const total = s.habits.length * 30;

    },0);
    return Math.round(done/total*100);

  const adhMeta = m.adherencia_meta_pct || 85;

  const clientesMes = rev?.clientes_sinergy ?? null;

    </div>`,
    actions: [
      { label: 'Guardar revisión', action: () => {
        const grasa    = parseFloat(document.getElementById('rm-grasa')?.value) || null;
        const peso     = parseFloat(document.getElementById('rm-peso')?.value) || null;
        const ingreso  = parseFloat(document.getElementById('rm-ingreso')?.value) || null;
        const ahorro   = parseFloat(document.getElementById('rm-ahorro')?.value) || null;
        const clientes = parseInt(document.getElementById('rm-clientes')?.value) || 0;
        const horas    = parseInt(document.getElementById('rm-horas')?.value) || 0;
        const funciono = document.getElementById('rm-funciono')?.value.trim() || '';
        const ajusta   = document.getElementById('rm-ajusta')?.value.trim() || '';

        if (!grasa && !ingreso) { UI.toast('Completa al menos grasa o ingresos.','warn'); return false; }

        const isNewRevMes = !(s.revisiones_mensuales || []).find(r => r.mes === mes);

        State.update(st => {
          if (!st.revisiones_mensuales) st.revisiones_mensuales = [];
          const idx = st.revisiones_mensuales.findIndex(r => r.mes === mes);
          const entry = { mes, fecha: today(), grasa_pct: grasa, peso_kg: peso,
            ingreso_usd: ingreso, ahorro_usd: ahorro, clientes_sinergy: clientes,
            horas_sinergy: horas, que_funciono: funciono, que_ajusta: ajusta };
          if (idx >= 0) st.revisiones_mensuales[idx] = entry;
          else st.revisiones_mensuales.unshift(entry);

          // Registrar medición física: upsert por fecha (no duplicar si se re-edita la revisión del mes)
          if (grasa || peso) {
            if (!st.fisico.mediciones) st.fisico.mediciones = [];
            const hoy = today();
            const existIdx = st.fisico.mediciones.findIndex(m => m.fecha === hoy);
            const medEntry = { fecha: hoy,
              peso_kg: peso || st.fisico.mediciones.slice(-1)[0]?.peso_kg,
              grasa_pct: grasa || st.fisico.mediciones.slice(-1)[0]?.grasa_pct };
            if (existIdx >= 0) st.fisico.mediciones[existIdx] = medEntry;
            else st.fisico.mediciones.push(medEntry);
          }
        });

        if (isNewRevMes) XP.add(75, 'Revisión mensual completada');
        UI.toast(isNewRevMes ? 'Revisión guardada. +75 XP 📊' : 'Revisión actualizada.', 'success', 4000);
        renderYo();
      }},
      { label: 'Ahora no', action: () => {} },
    ],
  });
};

function debeRevisarMes(s) {
  const dia = new Date().getDate();
  const mes = monthStr();
  if ((s.revisiones_mensuales || []).find(r => r.mes === mes)) return false;
  if (dia >= 25) return true;
  // Primeros 5 días del mes: mostrar si el mes anterior no tiene revisión
  if (dia <= 5) {
    const prevDate = new Date(); prevDate.setDate(0);
    const prevMes = monthStr(prevDate);
    if (!(s.revisiones_mensuales || []).find(r => r.mes === prevMes)) return true;
  }
  return false;
}

function renderABCDE() {
  let step = 0;
  const STEPS_ABCDE = [
    { label:'¿Qué pasó?', placeholder:'Solo los hechos, sin interpretación. ¿Qué ocurrió exactamente?', hint:'' },
    { label:'¿Qué me estoy diciendo?', placeholder:'La voz interna, textual. ¿Qué historia me cuento sobre eso?', hint:'' },
    { label:'¿Cómo me afectó?', placeholder:'¿Qué sentí? ¿Qué hice (o dejé de hacer) a raíz de eso?', hint:'' },
    { label:'¿Es realmente así?', placeholder:'¿Tengo evidencia sólida? ¿Qué le diría a un amigo que piensa lo mismo?', hint:'3 razones mínimo por las que puede no ser verdad.' },
    { label:'¿Cómo sigo?', placeholder:'Una creencia más útil + una micro-acción concreta en los próximos 10 min.', hint:'' },
  ];
  const answers = {};

  function paint() {
    const el = document.getElementById('abcde-container');
    if (!el) return;
    const s2 = STEPS_ABCDE[step];
    el.innerHTML = `
      <div class="card mb-md">
        <div class="text-xs text-lo mb-sm">Paso ${step+1}/5 · Reencuadra el pensamiento</div>
        <h3>${esc(s2.label)}</h3>
        ${s2.hint ? `<p class="text-xs text-lo mt-sm">${esc(s2.hint)}</p>` : ''}
      </div>
      <div class="field mb-md">
        <textarea id="abcde-ans" class="input" rows="4" placeholder="${esc(s2.placeholder)}">${esc(answers[step]||'')}</textarea>
      </div>
      <div class="row row-gap-sm">
        ${step > 0 ? `<button class="btn btn-secondary" onclick="abcdeBack()">Atrás</button>` : ''}
        <button class="btn btn-primary flex-1" onclick="abcdeNext()">
          ${step < 4 ? 'Siguiente →' : 'Cerrar y seguir (+30 XP)'}
        </button>
      </div>`;
    document.getElementById('abcde-ans')?.focus();
  }

  window._abcdePaint = paint;
  window.abcdeNext = () => {
    answers[step] = document.getElementById('abcde-ans')?.value || '';
    if (step < 4) { step++; paint(); }
    else {
      State.update(s => {
        s.protocols_log.unshift({ fecha:todayISO(), protocolo:'abcde', duracion_min:8, payload:answers, resultado_subjetivo_1_5:3 });
        s.journal.push({ id:Date.now().toString(), fecha:todayISO(), tipo:'abcde', payload:answers, tags:[] });
      });
      XP.add(30,'Reencuadra el fallo');
      UI.toast('Reencuadre completado. +30 XP','success');
      Router.navigate('protocolos');
    }
  };
  window.abcdeBack = () => { answers[step] = document.getElementById('abcde-ans')?.value||''; if(step>0){step--;paint();} };

  return `<div id="abcde-container"></div>`;
}

function initUrgeSurfingTimer() {
  let phase = 0;
  window.urgeStart = () => {
    const btn = document.getElementById('urge-btn');
    if (btn) btn.textContent = 'Corriendo...';
    let cycles = 5;
    const counter = document.getElementById('breath-counter');
    const phaseEl = document.getElementById('breath-phase');
    let secs = 30;
    const pause = setInterval(() => {
      secs--;
      if (counter) counter.textContent = secs+'s';
      if (phaseEl) phaseEl.textContent = 'Pausa...';
      if (secs <= 0) {
        clearInterval(pause);
        if (counter) counter.textContent = cycles;
        if (phaseEl) phaseEl.textContent = 'Inhala 4s';
        runBreath();
      }
    }, 1000);

    function runBreath() {
      const phases = [{t:'Inhala',s:4},{t:'Retén',s:4},{t:'Exhala',s:6}];
      let pi = 0, ps = phases[0].s;
      const iv = setInterval(() => {
        if (phaseEl) phaseEl.textContent = `${phases[pi].t}... ${ps}s`;
        ps--;
        if (ps < 0) { pi = (pi+1)%3; ps = phases[pi].s; if(pi===0){cycles--;if(counter)counter.textContent=cycles;} }
        if (cycles <= 0) {
          clearInterval(iv);
          if (phaseEl) phaseEl.textContent = '¡Completado!';
          if (btn) { btn.textContent = 'Finalizar (+15 XP)'; btn.onclick = urgeFinish; }
        }
      }, 1000);
    }
  };
  window.urgeFinish = () => {
    const loc = document.getElementById('urge-loc')?.value||'';
    const ev = document.getElementById('urge-evitar')?.value||'';
    State.update(s => { s.protocols_log.unshift({ fecha:todayISO(), protocolo:'urge_surfing', duracion_min:5, payload:{localizacion:loc, evitar:ev}, resultado_subjetivo_1_5:3 }); });
    XP.add(15,'Urge Surfing');
    UI.toast('Urge surfing completado. +15 XP','success');
    Router.navigate('protocolos');
  };
}

function initSCTimer() {
  const PHASES = [
    { title:'Mindfulness', body:'"Esto es un momento difícil."' },
    { title:'Humanidad compartida', body:'"El sufrimiento es parte de ser humano. No estoy solo."' },
    { title:'Auto-amabilidad', body:'¿Qué necesitas oír ahora? Escríbelo.' },
  ];
  window.scStart = () => {
    document.getElementById('sc-btn').disabled = true;
    let phase = 0, secs = 20;
    const circ = 2*Math.PI*52;
    const iv = setInterval(() => {
      const fill = document.getElementById('sc-fill');
      const timer = document.getElementById('sc-timer');
      const title = document.getElementById('sc-title');
      const body = document.getElementById('sc-body');
      if (!fill) { clearInterval(iv); return; }
      fill.style.strokeDashoffset = circ * (1 - (20-secs)/20);
      if (timer) timer.textContent = secs+'s';
      secs--;
      if (secs < 0) {
        phase++;
        if (phase < PHASES.length) {
          if(title) title.textContent = PHASES[phase].title;
          if(body) body.textContent = PHASES[phase].body;
          if(document.getElementById('sc-n')) document.getElementById('sc-n').textContent = phase+1;
          if (phase === 2) document.getElementById('sc-kindness')?.classList.remove('hidden');
          secs = 20;
          fill.style.strokeDashoffset = circ;
        } else {
          clearInterval(iv);
          if(timer) timer.textContent = '✓';
          const btn = document.getElementById('sc-btn');
          if(btn) { btn.textContent = 'Completado (+5 XP)'; btn.disabled = false; btn.onclick = scFinish; }
        }
      }
    }, 1000);
  };
  window.scFinish = () => {
    const kindness = document.getElementById('sc-kindness')?.value || '';
    State.update(s => { s.protocols_log.unshift({ fecha:todayISO(), protocolo:'self_compassion', duracion_min:1, payload:{kindness}, resultado_subjetivo_1_5:4 }); });
    XP.add(5,'Self-compassion pause');
    UI.toast('+5 XP. Bien por detenerte.','success');
    Router.navigate('protocolos');
  };
}

/* ═══════════════════════════════════════════════════════════
   VISTA: INSIGHTS
═══════════════════════════════════════════════════════════ */
const InsightsEngine = (() => {
  const rules = [
    {
      id:'sinergy_work_no_output',
      check: s => {
        const last28 = s.sinergy.outputs_log.filter(o => (Date.now()-new Date(o.fecha+'T00:00:00').getTime()) < 28*86400000);
        const deepW = s.habits.find(h => h.id==='h2');
        const adh = deepW ? deepW.completions.filter(d => (Date.now()-new Date(d+'T00:00:00').getTime()) < 28*86400000).length / 28 : 0;
        return adh > 0.8 && last28.length === 0;
      },
      msg: 'Adherencia de deep work >80% este mes, pero outputs reales = 0. El tiempo es input, no output. ¿Estás construyendo algo que quiere la gente?',
      accion: 'Pivota la métrica: de horas a clientes nuevos.',
    },
    {
      id:'sinergy_gm_critico',
      check: s => {
        const meses = s.sinergy.mensual.slice(-2);
        return meses.length >= 2 && meses.every(m => (m.ganancia_neta || 0) < 50000);
      },
      msg: 'La ganancia neta de Sinergy lleva dos meses muy baja. El problema no son las horas — puede ser el precio, costos ocultos o el modelo.',
      accion: 'Agenda 2h esta semana para analizar cuánto entra y cuánto sale, línea por línea.',
    },
    {
      id:'sueno_bajo',
      check: s => {
        const last21 = s.sueño.filter(d => (Date.now()-new Date(d.fecha+'T00:00:00').getTime()) < 21*86400000);
        if (last21.length < 7) return false;
        const avg = last21.reduce((a,b) => a+b.horas, 0) / last21.length;
        return avg < 7;
      },
      msg: 'Promedio de sueño bajo 7h las últimas semanas. Con menos de 7h y déficit calórico, tu cuerpo pierde más músculo que grasa — lo contrario de lo que buscas.',
      accion: 'Priorizar el sueño es priorizar la composición corporal. Bedtime a las 22:30.',
    },
    {
      id:'patron_emocional_celular',
      check: s => {
        const last14 = s.emociones_pre_procrastinacion.filter(e => (Date.now()-new Date(e.fecha+'T00:00:00').getTime()) < 14*86400000);
        if (last14.length < 5) return false;
        const ansiedad = last14.filter(e => e.emocion.some(em => ['Ansiedad','Aburrimiento'].includes(em))).length;
        return ansiedad / last14.length > 0.6;
      },
      msg: 'Más del 60% de tus episodios previos a distraerte son ansiedad o aburrimiento. Procrastinar no es falta de disciplina — es intentar escapar de una emoción incómoda.',
      accion: 'Surfea el impulso (3 min) o haz una pausa de autocompasión antes de abrir el celular.',
    },
    {
      id:'sin_partner_checkin',
      check: s => {
        const lastCI = s.accountability_checkins[0];
        if (!lastCI) return s.settings.accountability_partner.nombre && s.settings.fase >= 1;
        return (Date.now()-new Date(lastCI.fecha+'T00:00:00').getTime()) > 10*86400000;
      },
      msg: 'Llevas más de 10 días sin check-in con tu persona de apoyo. Reportar semanalmente a alguien de confianza aumenta significativamente el logro de metas.',
      accion: 'Agenda una llamada o mensaje de 15 min esta semana.',
    },
    {
      id:'fallo_sin_abcde',
      check: s => {
        let consec = 0;
        for (let i=0; i<2; i++) {
          const d = new Date(); d.setDate(d.getDate()-i);
          const ds = dateStr(d);
          if (s.habits.every(h => !h.completions.includes(ds))) consec++;
        }
        const lastABCDE = s.protocols_log.find(p => p.protocolo==='abcde');
        const recentABCDE = lastABCDE && (Date.now()-new Date(lastABCDE.fecha+'T00:00:00').getTime()) < 2*86400000;
        return consec >= 2 && !recentABCDE;
      },
      msg: 'Dos fallos consecutivos sin procesar. Un fallo es un evento; dos seguidos sin reflexionar se vuelve patrón.',
      accion: '5 min de "Reencuadra el fallo" ahora.',
    },
    {
      id:'progresion_fisica_ok',
      check: s => {
        const med = s.fisico.mediciones;
        if (med.length < 2) return false;
        const last = med.slice(-1)[0]; const prev = med.slice(-2)[0];
        const weeks = (new Date(last.fecha+'T00:00:00').getTime()-new Date(prev.fecha+'T00:00:00').getTime())/(7*86400000);
        return weeks >= 3 && last.grasa_pct < prev.grasa_pct && (prev.grasa_pct-last.grasa_pct) <= 1.5;
      },
      msg: 'Tu porcentaje de grasa bajó a ritmo saludable (0.5-1pp/semana). Sigue. No aceleres el déficit.',
      accion: 'Mantén el ritmo. Consistencia > intensidad.',
    },
  ];

  function generate() {
    const s = State.get();
    const active = s.insights.filter(i=>!i.descartado);
    // Regenerar si: no hay ninguno activo, o si el último fue hace más de 1 día
    const lastGen = s.insights[0]?.fecha;
    if (lastGen === todayISO() && active.length >= 2) return;

    let newInsights = 0;
    rules.forEach(rule => {
      if (newInsights >= 3) return;
      const alreadyActive = s.insights.find(i => i.tipo===rule.id && !i.descartado);
      if (alreadyActive) return;
      try {
        if (rule.check(s)) {
          State.update(st => { st.insights.unshift({ id:Date.now().toString()+rule.id, fecha:todayISO(), tipo:rule.id, mensaje:rule.msg, accion_sugerida:rule.accion, descartado:false }); if(st.insights.length>30) st.insights.length=30; });
          newInsights++;
        }
      } catch(e) {}
    });
  }

  return { generate };
})();

  const aguaHoy = (s.fisico?.agua||{})[today()] || 0;
  const adh30 = (() => {
    const total=s.habits.length*30; if(!total) return null;
    const done=s.habits.reduce((acc,h)=>{for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);if(h.completions.includes(dateStr(d)))acc++;}return acc;},0);
    return Math.round(done/total*100);
  })();

  // — Finanzas —
  const finMes = s.finanzas.mensual.find(m=>m.mes===mes)||{};
  const finPrev = s.finanzas.mensual.find(m=>m.mes===mesPrev)||{};
  const totalFijos = (s.finanzas.gastos_fijos||[]).reduce((sum,g)=>sum+(g.monto_clp||0),0);
  const ahorro = (finMes.ingreso_clp||0) - totalFijos - (finMes.gastos_variables_clp||0);
  const ahorroP = (finPrev.ingreso_clp||0) - totalFijos - (finPrev.gastos_variables_clp||0);
  const ahorroMeta = s.finanzas.meta_ahorro_pct || 20;
  const tasaAhorro = finMes.ingreso_clp > 0 ? Math.round(ahorro/finMes.ingreso_clp*100) : null;

  function deltaChip(val, prev, fmt2 = v => v, invertir = false) {
    if (!prev && prev !== 0) return '';
    const diff = val - prev;
    if (diff === 0) return `<span class="chip" style="font-size:10px">= igual</span>`;
    const positivo = invertir ? diff < 0 : diff > 0;
    return `<span class="chip ${positivo?'chip-identity':'chip-warn'}" style="font-size:10px">${diff>0?'↑':'↓'} ${fmt2(Math.abs(diff))}</span>`;
  }

  body.innerHTML = `
    <div class="section">
      <div class="section-title row-between"><span>${mesNombre}</span><span class="text-xs text-lo">Día ${dia}/${diasMes}</span></div>

      <!-- SINERGY -->
      <div class="card mb-sm" style="padding:14px 16px">
        <div class="row-between mb-sm">
          <span class="font-semibold text-sm">Sinergy</span>
          <button class="btn btn-ghost btn-sm" onclick="renderResultados('sinergy')">Ver detalle →</button>
        </div>
        <div class="grid-2" style="gap:8px;margin-bottom:8px">
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:${mrrActual>0?'var(--success)':'var(--text-lo)'}">${mrrActual>0?fmt(mrrActual):'—'}</div>
            <div class="text-xs text-lo">MRR empresa ${deltaChip(mrrActual,mrrPrev,v=>'$'+(v/1000).toFixed(0)+'k')}</div>
          </div>
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800">${mesOutputs.length}</div>
            <div class="text-xs text-lo">Outputs ${deltaChip(mesOutputs.length,prevOutputs.length,v=>v+' más')}</div>
          </div>
        </div>
        ${mrrActual===0 ? `<div class="text-xs text-lo">Sin MRR registrado · <button class="btn btn-ghost btn-sm" onclick="renderResultados('sinergy')" style="font-size:11px;padding:2px 6px">Registrar →</button></div>`
          : `<div class="text-xs text-lo">Ritmo: ~${ritmo} outputs/mes · ${crmClientes} cliente${crmClientes!==1?'s':''} cerrado${crmClientes!==1?'s':''} este mes</div>`}
      </div>

      <!-- HÁBITOS -->
      <div class="card mb-sm" style="padding:14px 16px">
        <div class="row-between mb-sm">
          <span class="font-semibold text-sm">Hábitos</span>
          <button class="btn btn-ghost btn-sm" onclick="Router.navigate('habitos')">Ver detalle →</button>
        </div>
        <div class="grid-2" style="gap:8px;margin-bottom:8px">
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:${adh7>=70?'var(--success)':adh7>=40?'var(--warn)':'var(--danger)'}">${adh7}%</div>
            <div class="text-xs text-lo">Adherencia 7 días</div>
          </div>
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:var(--primary)">${mejorRacha.n}</div>
            <div class="text-xs text-lo">Racha ${esc(mejorRacha.nombre)}</div>
          </div>
        </div>
        ${adh7 < 70 && habitosMasFlojo.nombre ? `<div class="text-xs" style="color:var(--warn)">Punto débil: ${esc(habitosMasFlojo.nombre)} (${habitosMasFlojo.n} días seguidos)</div>` : `<div class="text-xs text-lo">Adherencia 30d: ${adh30 !== null ? adh30+'%' : '—'}</div>`}
      </div>

      <!-- FÍSICO -->
      <div class="card mb-sm" style="padding:14px 16px">
        <div class="row-between mb-sm">
          <span class="font-semibold text-sm">Físico</span>
          <button class="btn btn-ghost btn-sm" onclick="Router.navigate('cuerpo')">Ver detalle →</button>
        </div>
        <div class="grid-2" style="gap:8px;margin-bottom:8px">
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:var(--success)">${medicion ? medicion.grasa_pct+'%' : '—'}</div>
            <div class="text-xs text-lo">% Grasa${medicion?` · ${medicion.fecha}`:' · sin datos'}</div>
          </div>
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:${aguaHoy>=8?'var(--success)':aguaHoy>=4?'var(--primary)':'var(--text-lo)'}">${aguaHoy}/8</div>
            <div class="text-xs text-lo">Vasos de agua hoy</div>
          </div>
        </div>
        ${!medicion ? `<div class="text-xs text-lo">Registra una medición en la revisión mensual para ver tu progreso.</div>` : ''}
      </div>

      <!-- FINANZAS -->
      <div class="card mb-sm" style="padding:14px 16px">
        <div class="row-between mb-sm">
          <span class="font-semibold text-sm">Finanzas personales</span>
          <button class="btn btn-ghost btn-sm" onclick="renderResultados('finanzas')">Ver detalle →</button>
        </div>
        <div class="grid-2" style="gap:8px;margin-bottom:8px">
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:${ahorro>=0?'var(--success)':'var(--danger)'}">${finMes.ingreso_clp>0?fmt(ahorro):'—'}</div>
            <div class="text-xs text-lo">Ahorro ${finMes.ingreso_clp>0?deltaChip(ahorro,ahorroP,v=>fmt(v)):''}</div>
          </div>
          <div style="background:var(--bg-2);border-radius:var(--r-md);padding:10px">
            <div class="num" style="font-size:20px;font-weight:800;color:${tasaAhorro!==null&&tasaAhorro>=ahorroMeta?'var(--success)':'var(--warn)'}">${tasaAhorro!==null?tasaAhorro+'%':'—'}</div>
            <div class="text-xs text-lo">Tasa ahorro · meta ${ahorroMeta}%</div>
          </div>
        </div>
        ${!finMes.ingreso_clp ? `<div class="text-xs text-lo">Ingresa tus datos del mes en la pestaña Finanzas.</div>` : ''}
      </div>
    </div>`;
}

  const mesNombre   = new Date().toLocaleDateString('es-CL', { month: 'long', year: 'numeric' });

  const TIPO_LABEL = {

    ml_record:'🏆 Hito ML', llamada:'📞 Llamada', cliente_nuevo:'🎉 Cliente', feature:'🚀 Feature', margen_millon:'💰 Millón'

  const fmt = n => `$${Math.abs(Math.round(n)).toLocaleString('es-CL')}`;

  // MRR últimos 6 meses para trend
  const ultimos6 = Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-i);return monthStr(d);}).reverse();
  const mrrTrend = ultimos6.map(m=>({m,v:(s.sinergy.mensual.find(x=>x.mes===m)||{}).ingresos_empresa_clp||0}));

          </div>
          <div class="text-right">
            ${mesData.ingresos_empresa_clp>0&&prevData.ingresos_empresa_clp>0 ? `<div style="font-size:20px;font-weight:800;color:${mrrDelta>=0?'var(--success)':'var(--danger)'}">${mrrDelta>=0?'↑':'↓'} ${fmt(Math.abs(mrrDelta))}</div><div class="text-xs text-lo">vs mes anterior</div>` : ''}
          </div>
        </div>
        <!-- Mini bar chart MRR -->
        ${mrrTrend.some(x=>x.v>0) ? `<div style="display:flex;align-items:flex-end;gap:4px;height:40px;margin-top:8px">
          ${mrrTrend.map(x=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="width:100%;border-radius:3px 3px 0 0;background:${x.m===mes?'var(--success)':'var(--bg-3)'};height:${Math.max(4,Math.round(x.v/mrrMax*36))}px" title="${fmt(x.v)}"></div>
            <div class="text-xs text-lo" style="font-size:9px">${x.m.slice(5)}</div>
          </div>`).join('')}
        </div>` : `<div class="text-xs text-lo mt-sm">Registra el MRR mensual para ver la curva de crecimiento.</div>`}
        <button class="btn btn-ghost btn-sm mt-md" onclick="openGananciaModal()" style="width:100%">Actualizar MRR →</button>
      </div>

      <!-- Stats outputs -->
      <div class="grid-2 mb-md" style="gap:8px">
        <div class="stat-card">
          <div class="stat-val num">${crmLlamadas}</div>
          <div class="stat-label">📞 Llamadas</div>
        </div>
        <div class="stat-card">
          <div class="stat-val num">${crmClientes}</div>
          <div class="stat-label">🎉 Clientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-val num">${crmFeatures + mlListings}</div>
          <div class="stat-label">🚀 Features/Listings</div>
        </div>
        <div class="stat-card">
          <div class="stat-val num" style="color:${outDelta>=0?'var(--success)':'var(--warn)'}">${mesOutputs.length}</div>
          <div class="stat-label">⚡ Outputs ${outDelta!==0?`(${outDelta>=0?'+':''}${outDelta} vs ant.)`:''}</div>
        </div>
      </div>
      <div class="text-xs text-lo mb-md" style="text-align:center">Ritmo actual: ~${ritmo} outputs este mes</div>
      <button class="btn btn-primary btn-block" onclick="openOutputModal()">+ Registrar output de hoy</button>

    <div class="section">
      <div class="section-title">Outputs del mes</div>
      ${mesOutputs.length === 0
        ? `<div class="empty-state"><div class="empty-sub">Sin outputs este mes todavía.</div></div>`
        : `<div class="stack stack-sm">${mesOutputs.slice(0,20).map(o => `
            <div class="card" style="padding:10px 14px">
              <div class="row-between">
                <span class="chip chip-primary">${TIPO_LABEL[o.tipo]||esc(o.tipo)}</span>
                <span class="text-xs text-lo">${formatDate(o.fecha)}</span>
              </div>
              ${o.detalle ? `<div class="text-sm text-md mt-sm">${esc(o.detalle)}</div>` : ''}
            </div>`).join('')}</div>`}
    </div>

    <div class="section">
      <div class="section-title">Metas del trimestre</div>

            <span class="text-sm">${esc(g)}</span>
            <button class="btn btn-ghost btn-sm" onclick="toggleMetaTrimestre(${i})" style="color:var(--success);font-size:18px">○</button>
          </div>`).join('') || `<div style="padding:12px 14px"><span class="text-sm text-lo">Sin metas configuradas aún.</span></div>`}
      </div>
    </div>`;

  window.toggleMetaTrimestre = (i) => {

          <div class="hint">Lo que te llevaste vos. Inclúyelo en Finanzas como parte de tu ingreso total.</div>

        <div class="field"><label>Nota (opcional)</label><input id="gan-nota" class="input" value="${esc(md.notas||'')}"></div>

      body: `<div class="stack stack-md">
        <div class="field"><label>Tipo</label>

        <div class="field"><label>Detalle (opcional)</label>

        </div>

      actions: [

function _renderResultadosFinanzas(body) {
  const s = State.get();
  const mes = monthStr();
  const mesNombre = new Date().toLocaleDateString('es-CL', { month: 'long', year: 'numeric' });
  const f = s.finanzas;
  const mesDat = f.mensual.find(m => m.mes === mes) || { mes, ingreso_clp: 0, gastos_variables_clp: 0, notas: '' };
  const totalFijos = f.gastos_fijos.reduce((sum, g) => sum + (g.monto_clp || 0), 0);
  const ahorro = mesDat.ingreso_clp - totalFijos - mesDat.gastos_variables_clp;
  const tasaAhorro = mesDat.ingreso_clp > 0 ? Math.round(ahorro / mesDat.ingreso_clp * 100) : 0;
  const metaPct = f.meta_ahorro_pct || 20;
  const metaMonto = mesDat.ingreso_clp > 0 ? Math.round(mesDat.ingreso_clp * metaPct / 100) : 0;
  const cumpleMeta = mesDat.ingreso_clp > 0 && tasaAhorro >= metaPct;
  const fmt = n => n >= 0 ? `$${Math.abs(n).toLocaleString('es-CL')}` : `-$${Math.abs(n).toLocaleString('es-CL')}`;

  body.innerHTML = `
    <div class="section">
      <div class="section-title">${mesNombre}</div>
      <div class="card card-primary mb-md" style="padding:20px">
        <div class="row-between mb-md">
          <div>
            <div class="text-xs text-lo font-semibold uppercase mb-sm">Ahorrado este mes</div>
            <div class="num" style="font-size:var(--fs-2xl);font-weight:800;color:${ahorro>=0?'var(--success)':'var(--danger)'}">${fmt(ahorro)}</div>
          </div>
          <div class="text-right">
            <div style="font-size:32px;font-weight:800;color:${cumpleMeta?'var(--success)':'var(--warn)'}">${tasaAhorro}%</div>

          </div>

        ${mesDat.ingreso_clp > 0 ? `
        <div class="progress-bar" style="height:10px;background:var(--bg-3)">
          <div style="height:10px;background:${cumpleMeta?'var(--success)':'var(--warn)'};width:${Math.min(tasaAhorro,100)}%;border-radius:var(--r-full);transition:width 1s var(--ease-standard)"></div>
        </div>
        <div class="text-xs text-lo mt-sm">Meta: ${fmt(metaMonto)} CLP</div>` : '<div class="text-xs text-lo">Ingresa tu ingreso del mes para ver el análisis.</div>'}
      </div>

      <div class="card mb-md" style="padding:0">
        ${[
          ['↑ Ingreso total', mesDat.ingreso_clp, 'var(--success)'],
          ['− Gastos fijos', -totalFijos, 'var(--text-md)'],

            <span class="text-sm font-semibold" style="color:${color}">${val!==0?fmt(Math.abs(val)):'—'}</span>

          <span class="text-sm font-semibold">= Ahorro real</span>
          <span class="font-semibold" style="color:${ahorro>=0?'var(--success)':'var(--danger)'}">${mesDat.ingreso_clp>0?fmt(ahorro):'—'}</span>
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="editarMesFinanzas()">${mesDat.ingreso_clp>0?'Actualizar mes':'+ Ingresar datos del mes'}</button>

        ${f.gastos_fijos.length===0
          ? `<div class="empty-state" style="padding:20px"><div class="empty-sub">Arriendo, servicios, suscripciones...</div></div>`
          : f.gastos_fijos.map((g,i) => `
            <div class="row-between" style="padding:11px 14px;border-bottom:1px solid var(--border)">
              <span class="text-sm">${esc(g.nombre)}</span>
              <div class="row row-gap-sm">
                <span class="text-sm font-semibold">${fmt(g.monto_clp)}</span>
                <button class="btn btn-icon btn-ghost btn-sm" onclick="eliminarGastoFijo(${i})" style="color:var(--text-lo)">✕</button>
              </div>
            </div>`).join('')}
        <div class="row-between" style="padding:11px 14px;background:var(--bg-2)">
          <span class="text-xs text-lo font-semibold uppercase">Total fijos</span>
          <span class="font-semibold">${fmt(totalFijos)}</span>
        </div>
      </div>
      <button class="btn btn-secondary btn-block mt-md" onclick="agregarGastoFijo()">+ Agregar gasto fijo</button>
    </div>

    ${f.mensual.filter(m=>m.ingreso_clp>0).length>1 ? `
    <div class="section">
      <div class="section-title">Historial</div>
      <div class="stack stack-sm">
        ${f.mensual.filter(m=>m.ingreso_clp>0).slice(0,6).map(m => {
          const fij = f.gastos_fijos.reduce((sum,g)=>sum+g.monto_clp,0);
          const ah  = m.ingreso_clp - fij - m.gastos_variables_clp;
          const tasa = Math.round(ah/m.ingreso_clp*100);
          const ok   = tasa >= metaPct;
          const mn   = new Date(m.mes+'-01').toLocaleDateString('es-CL',{month:'short',year:'numeric'});
          return `<div class="card" style="padding:10px 14px">
            <div class="row-between">
              <span class="text-sm font-semibold">${mn}</span>
              <div class="row row-gap-sm">
                <span class="chip ${ok?'chip-identity':'chip-warn'}">${tasa}% ahorrado</span>
                <span class="text-sm text-lo">${fmt(ah)}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">Configuración</div>
      <div class="card">
        <div class="row-between">
          <div>
            <div class="text-sm font-semibold">Meta de ahorro mensual</div>
            <div class="text-xs text-lo mt-sm">Porcentaje del ingreso que quieres ahorrar</div>
          </div>
          <button class="btn btn-sm btn-ghost" onclick="editarMetaAhorro()">${metaPct}% →</button>
        </div>
      </div>
    </div>`;

  // Reusar handlers de renderFinanzas
  window.editarMesFinanzas = () => {
    const s2 = State.get();
    const md  = s2.finanzas.mensual.find(m => m.mes === mes) || {};
    UI.modal({
      title: `Datos de ${new Date().toLocaleDateString('es-CL',{month:'long',year:'numeric'})}`,
      body: `<div class="stack stack-md">
        <div class="field"><label>Ingreso total del mes (CLP)</label>
          <div class="input-group"><span class="input-prefix" style="font-size:11px">$</span>
          <input id="fin-ingreso" class="input input-prefixed num" type="number" placeholder="ej. 1200000" value="${md.ingreso_clp||''}"></div>
          <div class="hint">Carvuk + retiro Sinergy + cualquier otra fuente</div>
        </div>
        <div class="field"><label>Gastos variables del mes (CLP)</label>
          <div class="input-group"><span class="input-prefix" style="font-size:11px">$</span>
          <input id="fin-variables" class="input input-prefixed num" type="number" placeholder="ej. 400000" value="${md.gastos_variables_clp||''}"></div>
          <div class="hint">Comida, transporte, salidas, imprevistos</div>
        </div>
        <div class="field"><label>Nota del mes (opcional)</label>
          <input id="fin-notas" class="input" value="${esc(md.notas||'')}">
        </div>
      </div>`,
      actions: [
        { label: 'Guardar', action: () => {
          const ingreso   = parseInt(document.getElementById('fin-ingreso')?.value) || 0;
          const variables = parseInt(document.getElementById('fin-variables')?.value) || 0;
          const notas     = document.getElementById('fin-notas')?.value.trim() || '';
          if (!ingreso) { UI.toast('Ingresa al menos el ingreso del mes.', 'warn'); return false; }
          const isNew = !State.get().finanzas.mensual.find(m => m.mes === mes);
          State.update(s => {
            const idx = s.finanzas.mensual.findIndex(m => m.mes === mes);
            const entry = { mes, ingreso_clp: ingreso, gastos_variables_clp: variables, notas };
            if (idx >= 0) s.finanzas.mensual[idx] = entry;
            else s.finanzas.mensual.unshift(entry);
          });
          if (isNew) XP.add(20, 'Finanzas del mes registradas');
          UI.toast('Guardado.', 'success');
          renderResultados('finanzas');
        }},
        { label: 'Cancelar', action: () => {} },
      ],
    });
  };
  window.agregarGastoFijo = () => {
    UI.modal({
      title: 'Agregar gasto fijo',
      body: `<div class="stack stack-md">
        <div class="field"><label>Nombre</label><input id="gf-nombre" class="input" placeholder="ej. Arriendo, Netflix..."></div>
        <div class="field"><label>Monto mensual (CLP)</label>
          <div class="input-group"><span class="input-prefix" style="font-size:11px">$</span>
          <input id="gf-monto" class="input input-prefixed num" type="number" placeholder="ej. 350000"></div>
        </div>
      </div>`,
      actions: [
        { label: 'Agregar', action: () => {
          const nombre = document.getElementById('gf-nombre')?.value.trim();
          const monto  = parseInt(document.getElementById('gf-monto')?.value) || 0;
          if (!nombre || !monto) { UI.toast('Completa nombre y monto.', 'warn'); return false; }
          State.update(s => { s.finanzas.gastos_fijos.push({ nombre, monto_clp: monto }); });
          UI.toast('Gasto fijo agregado.', 'success');
          renderResultados('finanzas');
        }},
        { label: 'Cancelar', action: () => {} },
      ],
    });
  };
  window.eliminarGastoFijo = (i) => {
    State.update(s => { s.finanzas.gastos_fijos.splice(i, 1); });
    renderResultados('finanzas');
  };
  window.editarMetaAhorro = () => {
    const actual = State.get().finanzas.meta_ahorro_pct;
    UI.modal({
      title: 'Meta de ahorro mensual',
      body: `<p class="text-sm text-lo mb-md" style="line-height:var(--lh-relaxed)">La regla del 20% es un buen punto de partida. Si recién empiezas, 10% ya es un avance real.</p>
        <div class="field"><label>Meta (%)</label>
        <input id="meta-pct" class="input num" type="number" min="1" max="80" value="${actual}" placeholder="20"></div>`,
      actions: [
        { label: 'Guardar', action: () => {
          const pct = parseInt(document.getElementById('meta-pct')?.value) || 20;
          State.update(s => { s.finanzas.meta_ahorro_pct = Math.min(80, Math.max(1, pct)); });
          UI.toast('Meta actualizada.', 'success');
          renderResultados('finanzas');
        }},
        { label: 'Cancelar', action: () => {} },
      ],
    });
  };
}

function renderInsights() {
  InsightsEngine.generate();
  const s = State.get();
  const active = s.insights.filter(i => !i.descartado);
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="page">

        <button class="btn btn-icon btn-ghost" onclick="Router.navigate('yo')" aria-label="Volver">

        </button>
        <h2>Insights</h2>
      </div>
      ${active.length === 0
        ? `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div><div class="empty-title">Sin insights nuevos</div><div class="empty-sub">Necesitas al menos 7 días de datos para que se generen.</div></div>`
        : active.map(ins => `
          <div class="insight-card" id="ins-${ins.id}">
            <div class="insight-meta">${formatDate(ins.fecha)}</div>
            <div class="insight-msg">${esc(ins.mensaje)}</div>
            ${ins.accion_sugerida ? `<div class="text-xs text-primary mt-sm font-semibold">→ ${esc(ins.accion_sugerida)}</div>` : ''}
            <div class="insight-actions">
              <button class="insight-btn" onclick="dismissInsight('${ins.id}','ok')">Me sirve</button>
              <button class="insight-btn" onclick="dismissInsight('${ins.id}','know')">Ya lo sé</button>
              <button class="insight-btn" onclick="dismissInsight('${ins.id}','dismiss')">Descartar</button>
            </div>
          </div>`).join('')}

}

function renderPartner() {
  const s = State.get();
  const p = s.settings.accountability_partner;
  const semana = weekISO();
  const checkin = s.accountability_checkins.find(c => c.semana_iso===semana);
  const cumplidos = s.habits.filter(h => {
    const last7 = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return dateStr(d);});
    const done = last7.filter(d=>h.completions.includes(d)).length;
    return done >= 5;
  }).length;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="page">
      <div class="page-header" style="position:static;padding:8px 0 16px">
        <button class="btn btn-icon btn-ghost" onclick="Router.navigate('yo')" aria-label="Volver">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2>Tu persona de apoyo</h2>
      </div>

      ${!p.nombre ? `<div class="card card-warn mb-md">
        <p class="text-sm" style="color:var(--warn)">Aún no tienes persona de apoyo configurada. Reportar tu progreso a alguien cada semana aumenta mucho el logro de metas.</p>
      </div>` : ''}

      <div class="card mb-lg">
        <div class="field mb-md"><label>Nombre del partner</label><input id="pt-nombre" class="input" value="${esc(p.nombre)}" placeholder="Nombre"></div>
        <div class="field mb-md"><label>Contacto (WhatsApp/tel)</label><input id="pt-contacto" class="input" value="${esc(p.contacto)}" placeholder="+56 9..."></div>
        <div class="field mb-md"><label>Día de check-in</label>
          <select id="pt-dia" class="input">
            ${['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'].map(d=>`<option ${p.dia_checkin===d?'selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-secondary btn-block" onclick="savePartnerData()">Guardar</button>
      </div>

      <div class="section">
        <div class="section-title">Check-in esta semana</div>
        <div class="checkin-card">
          <p class="text-sm text-md mb-md">Template para enviar por WhatsApp:</p>
          <div id="checkin-preview" style="background:var(--bg-2);border-radius:8px;padding:12px;font-size:var(--fs-sm);white-space:pre-wrap;line-height:var(--lh-relaxed);color:var(--text-md)">
${generateCheckinTemplate(s, cumplidos)}
          </div>
          <button class="btn btn-primary btn-block mt-md" onclick="copyCheckin()">Copiar para WhatsApp</button>
          ${p.contacto ? `<a href="https://wa.me/${p.contacto.replace(/\D/g,'')}" target="_blank" class="btn btn-ghost btn-block mt-sm">Abrir WhatsApp ↗</a>` : ''}
          ${checkin
            ? `<div class="chip chip-success mt-md">✓ Check-in registrado esta semana</div>`
            : `<button class="btn btn-secondary btn-block mt-sm" onclick="registrarCheckin()">✓ Marcar check-in como hecho</button>`}
        </div>
      </div>
    </div>`;

  window.savePartnerData = () => {
    State.update(s => {
      s.settings.accountability_partner.nombre = document.getElementById('pt-nombre')?.value.trim()||'';
      s.settings.accountability_partner.contacto = document.getElementById('pt-contacto')?.value.trim()||'';
      s.settings.accountability_partner.dia_checkin = document.getElementById('pt-dia')?.value||'Domingo';
      s.fase0_checklist.accountability_partner_confirmado = !!s.settings.accountability_partner.nombre;
    });
    UI.toast('Partner actualizado.','success');
  };
  window.copyCheckin = () => {
    const text = document.getElementById('checkin-preview')?.textContent||'';
    navigator.clipboard?.writeText(text).then(()=>UI.toast('Copiado al portapapeles.','success')).catch(()=>UI.toast('Selecciona y copia manualmente.','warn'));
  };
  window.registrarCheckin = () => {
    const semana = weekISO();
    State.update(s => {
      if (!s.accountability_checkins.find(c => c.semana_iso === semana)) {
        s.accountability_checkins.unshift({ semana_iso: semana, fecha: todayISO(), cumplidos });
      }
    });
    XP.add(20, 'Check-in semanal con partner');
    UI.toast('Check-in registrado. +20 XP 🤝','success');
    renderPartner();
  };
}

function generateCheckinTemplate(s, cumplidos) {
  const semana = new Date().toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});
  return `Hola ${s.settings.accountability_partner.nombre||'partner'}, check-in semanal (${semana}):

✅ Hábitos cumplidos: ${cumplidos}/${s.habits.length} (>5 días/semana)
📊 XP esta semana: ${s.xp.history.filter(h=>(Date.now()-new Date(h.fecha+'T00:00:00').getTime())<7*86400000).reduce((a,b)=>a+b.delta,0).toLocaleString('es-CL')}

Para la próxima semana me comprometo a:
1.
2.
3.

Estado emocional: /10
Notas: `;
}

function renderExperimentos() {
  const s = State.get();
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="page">
      <div class="page-header" style="position:static;padding:8px 0 16px">
        <button class="btn btn-icon btn-ghost" onclick="Router.navigate('yo')" aria-label="Volver">

      </div>

      <button class="btn btn-primary btn-block mb-lg" onclick="addExperimentoModal()">+ Nuevo experimento</button>
      ${s.experimentos.length === 0
        ? `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg></div><div class="empty-title">Sin experimentos</div><div class="empty-sub">Un experimento es una pregunta con hipótesis y métrica. No un proyecto.</div></div>`
        : s.experimentos.map(e => `<div class="exp-card">
            <div class="row-between mb-sm">
              <div class="font-semibold">${esc(e.nombre)}</div>
              <span class="exp-status ${e.estado==='concluido'?'done':''}">${e.estado==='activo'?'Activo':'Concluido'}</span>
            </div>
            <div class="text-sm text-md mb-sm">${esc(e.hipotesis)}</div>
            <div class="text-xs text-lo">Métrica: ${esc(e.metrica)} · Fin: ${formatDate(e.fecha_fin)}</div>
            ${e.estado==='activo' ? `<button class="btn btn-sm btn-ghost mt-sm" onclick="concludeExperimento('${e.id}')">Concluir + aprendizaje</button>` : e.aprendizaje ? `<div class="text-xs text-primary mt-sm font-semibold">Aprendizaje: ${esc(e.aprendizaje)}</div>` : ''}
          </div>`).join('')}
    </div>`;

  window.addExperimentoModal = () => {
    UI.modal({
      title:'Nuevo experimento',
      body:`<div class="stack stack-md">
        <div class="field"><label>Nombre</label><input id="exp-n" class="input" placeholder="Ej: Llamadas frías lunes"></div>
        <div class="field"><label>Hipótesis</label><textarea id="exp-h" class="input" rows="2" placeholder="Si hago X durante Y semanas, entonces Z..."></textarea></div>
        <div class="field"><label>Métrica de éxito</label><input id="exp-m" class="input" placeholder="Ej: tasa de conversión %"></div>
        <div class="field"><label>Fecha de conclusión</label><input id="exp-f" class="input" type="date"></div>
      </div>`,
      actions:[{ label:'Crear', action:() => {
        const nombre = document.getElementById('exp-n')?.value.trim();
        if (!nombre) { UI.toast('Nombre requerido.','warn'); return false; }
        State.update(s => { s.experimentos.unshift({ id:Date.now().toString(), nombre, hipotesis:document.getElementById('exp-h')?.value||'', metrica:document.getElementById('exp-m')?.value||'', fecha_inicio:todayISO(), fecha_fin:document.getElementById('exp-f')?.value||'', estado:'activo', resultado:'', aprendizaje:'' }); });
        UI.toast('Experimento creado.','success');
        renderExperimentos();
      }}],
    });
  };
  window.concludeExperimento = (id) => {
    UI.modal({
      title:'Concluir experimento',
      body:`<div class="stack stack-md">
        <div class="field"><label>Resultado</label><textarea id="exp-res" class="input" rows="2" placeholder="¿Qué observaste?"></textarea></div>
        <div class="field"><label>Aprendizaje principal</label><textarea id="exp-ap" class="input" rows="2" placeholder="¿Qué sabes ahora que no sabías?"></textarea></div>
      </div>`,
      actions:[{ label:'Guardar + 150 XP', action:() => {
        State.update(s => { const e = s.experimentos.find(x=>x.id===id); if(e){ e.estado='concluido'; e.resultado=document.getElementById('exp-res')?.value||''; e.aprendizaje=document.getElementById('exp-ap')?.value||''; } });

        UI.confetti(40);
        UI.toast('Experimento concluido. +150 XP','success');
        renderExperimentos();
      }}],
    });
  };
}

      <div class="section">
        <div class="section-title">Info</div>
        <div class="card">
          <div class="settings-row"><span class="text-sm text-lo">Versión</span><span class="text-sm">2.1.0</span></div>
          <div class="settings-row"><span class="text-sm text-lo">Schema</span><span class="text-sm num">v4</span></div>
          <div class="settings-row"><span class="text-sm text-lo">Fase actual</span><span class="text-sm">Fase ${s.settings.fase}</span></div>
        </div>
      </div>

      <div class="card mb-md">
        <div class="font-semibold mb-sm">Exportar mis datos</div>
        <p class="text-sm text-lo mb-md" style="line-height:var(--lh-relaxed)">Descarga todo en JSON. Pegalo en una IA para analizar fallas, progreso y patrones del mes.</p>
        <button class="btn btn-secondary btn-block" onclick="exportarDatos()">Descargar JSON</button>
      </div>

      <div class="danger-zone">
        <div class="font-semibold mb-md" style="color:var(--danger)">Zona peligrosa</div>
        <button class="btn btn-danger btn-block" onclick="confirmReset()">Borrar todos los datos</button>
      </div>
    </div>`;

  window.exportarDatos = () => {
    const s = State.get();
    const mes = monthStr();
    // Resumen legible para IA
    const resumen = {
      exportado_el: new Date().toISOString(),
      mes_actual: mes,
      perfil: { nombre: s.profile.nombre, fase: s.settings.fase },
      xp: { total: s.xp.total, nivel: s.xp.nivel },
      habitos: s.habits.map(h => ({
        nombre: h.nombre,
        escala: h.escala_actual,
        racha_actual: calcLiveStreak(h.completions || [], h.freeze_completions || []),
        racha_record: h.longestStreak || 0,
        completions_totales: (h.completions || []).length,
        completions_este_mes: (h.completions || []).filter(d => d.startsWith(mes)).length,
      })),
      agua_este_mes: Object.entries(s.fisico.agua || {})
        .filter(([k]) => k.startsWith(mes))
        .map(([fecha, vasos]) => ({ fecha, vasos })),
      sinergy_este_mes: {
        datos: s.sinergy.mensual.find(m => m.mes === mes) || {},
        outputs: (s.sinergy.outputs_log || []).filter(o => o.fecha?.startsWith(mes)),
      },
      finanzas_este_mes: s.finanzas.mensual.find(m => m.mes === mes) || {},
      gastos_fijos: s.finanzas.gastos_fijos || [],
      revisiones_mensuales: s.revisiones_mensuales || [],
      mediciones_fisicas: s.fisico.mediciones || [],
      journal_este_mes: (s.journal || []).filter(j => j.fecha?.startsWith(mes)),
      metas_5y: s.metas_5y,
    };
    const blob = new Blob([JSON.stringify(resumen, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `misistema-${mes}.json`; a.click();
    URL.revokeObjectURL(url);
    UI.toast('Datos exportados. Pégalos en una IA para analizarlos.', 'success', 4000);
  };

  window.setTheme = (t) => {
    State.set('settings.theme', t);
    applyTheme(t);
  };
  window.toggleSetting = (k, v) => { State.set(`settings.${k}`, v); };
  window.toggleNotifs = async (v) => {
    if (v) {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { UI.toast('Permiso de notificaciones denegado.','warn'); return; }
    }
    State.set('settings.notificaciones_activas', v);
  };
  window.importData = async (input) => {
    const file = input.files[0]; if (!file) return;
    try {
      await State.importJSON(file);
      UI.toast('Datos importados. Recargando...','success');
      setTimeout(() => location.reload(), 1500);
    } catch(e) { UI.toast('Error al importar. Verifica el archivo.','warn'); }
  };
  window.testNotif = () => {
    if (!('Notification' in window) || Notification.permission !== 'granted') {
      UI.toast('Primero activa las notificaciones.', 'warn'); return;
    }
    Notifs.send('MI SISTEMA', 'Las notificaciones están funcionando. Estás al día.');
    UI.toast('Notificación enviada', 'success');
  };
  window.confirmReset = async () => {
    const ok1 = await UI.confirm('¿Quieres pausar 7 días en lugar de borrar? El sistema esperará. Tus datos siguen aquí.', { title:'Antes de borrar', ok:'Pausar 7 días', cancel:'Borrar de todas formas', danger:false });
    if (ok1) { State.set('settings.modo_crisis', true); UI.toast('Modo pausa activado por 7 días.','success'); Router.navigate('hoy'); return; }
    const ok2 = await UI.confirm('Esta acción es irreversible. ¿Seguro que quieres borrar todo?', { ok:'Sí, borrar todo', cancel:'Cancelar', danger:true });
    if (ok2) { State.reset(); location.reload(); }
  };
}

/* ═══════════════════════════════════════════════════════════
   VISTA: COCINA (Recetas + Plan semana + Lista compras)
═══════════════════════════════════════════════════════════ */
function renderCocina(tab = 'recetas') {
  const s = State.get();
  const recetas = defaultRecetas();
  const TABS = [['recetas','Recetas'],['plan','Plan semana'],['compras','Compras']];
  const app = document.getElementById('app');
  app.innerHTML = `<div class="page">
    <h2 style="margin-bottom:4px">Cocina</h2>
    <p class="text-xs text-lo mb-md">Meal prep · 1 sesión/semana · 5 envases</p>
    <div class="tab-row mb-md" role="tablist">
      ${TABS.map(([t,l]) => `<button class="tab-btn${tab===t?' active':''}" role="tab" aria-selected="${tab===t}" onclick="renderCocina('${t}')">${l}</button>`).join('')}
    </div>
    <div id="cocina-body"></div>
  </div>`;

  const body = document.getElementById('cocina-body');
  if (tab === 'recetas') _renderRecetasList(s, recetas, body);
  else if (tab === 'plan') _renderPlanSemanal(s, recetas, body);
  else if (tab === 'compras') _renderListaCompras(s, recetas, body);

  window.renderCocina = renderCocina;
  window.toggleFavoritaReceta = (id) => {
    State.update(st => {
      const idx = st.cocina.favoritas.indexOf(id);
      if (idx === -1) st.cocina.favoritas.push(id);
      else st.cocina.favoritas.splice(idx, 1);
    });
    renderCocina(tab);
  };
  window.usarRecetaSemana = (id, tipo) => {
    State.update(st => {
      st.cocina.plan_semanal.semana = weekISO();
      if (tipo === 'shot') {
        st.cocina.plan_semanal.shot_id = st.cocina.plan_semanal.shot_id === id ? null : id;
      } else {
        const key = tipo === 'almuerzo' ? 'almuerzo_ids' : tipo === 'cena' ? 'cena_ids' : 'desayuno_ids';
        const arr = st.cocina.plan_semanal[key] || [];
        st.cocina.plan_semanal[key] = arr;
        const idx = arr.indexOf(id);
        if (idx !== -1) arr.splice(idx, 1);
        else if (arr.length < 2) arr.push(id);
        else UI.toast('Ya tienes 2 recetas de ' + tipo + '. Quita una primero.', 'warn');
      }
    });
    UI.toast('Plan actualizado.', 'success');
    renderCocina(tab);
  };
  window.toggleShotPlan = () => {
    State.update(st => {
      const p = st.cocina.plan_semanal;
      p.shot_id = p.shot_id ? null : 'sh1';
    });
    renderCocina(tab);
  };
  window.generarListaCompras = (semanas) => {
    const plan = State.get('cocina.plan_semanal');
    const sem = semanas || State.get('cocina.lista_compras.semanas_compra') || 1;
    const items = [];
    const addIngredientes = (recetaId, multBase) => {
      const r = recetas.find(x => x.id === recetaId);
      if (!r) return;
      const mult = multBase * sem;
      r.ingredientes.forEach(ing => {
        const key = ing.item.toLowerCase();
        const exist = items.find(i => i.item.toLowerCase() === key);
        if (exist) { exist.costo_clp += ing.costo_clp * mult; }
        else { items.push({ item: ing.item, cantidad: ing.cantidad + (mult > 1 ? ` ×${mult}` : ''), cat: ing.cat, costo_clp: ing.costo_clp * mult, comprado: false }); }
      });
    };
    const nAl = (plan.almuerzo_ids || []).length;
    (plan.almuerzo_ids || []).forEach(id => addIngredientes(id, nAl === 1 ? 5 : 3));
    const nCe = (plan.cena_ids || []).length;
    (plan.cena_ids || []).forEach(id => addIngredientes(id, nCe === 1 ? 5 : 3));
    const nDes = (plan.desayuno_ids || []).length;
    (plan.desayuno_ids || []).forEach(id => addIngredientes(id, nDes === 1 ? 5 : 3));
    if (plan.shot_id) addIngredientes(plan.shot_id, 7); // 7 días/sem
    // Batidos — agregar whey protein si aplica
    const batidosDia = plan.batidos_dia || 0;
    if (batidosDia > 0) {
      const scoopsSem = batidosDia * 7 * sem;
      const gTotal = scoopsSem * 30;
      items.push({ item: 'Whey protein', cantidad: `~${gTotal}g (${scoopsSem} scoops)`, cat: 'proteinas', costo_clp: batidosDia * 600 * 7 * sem, comprado: false });
    }
    const CATS_ORDER = ['proteinas','verduras','frutas','lacteos','carbos','grasas','especias','extras'];
    items.sort((a, b) => CATS_ORDER.indexOf(a.cat) - CATS_ORDER.indexOf(b.cat));
    State.update(st => { st.cocina.lista_compras = { items, semana: weekISO(), generada: todayISO(), semanas_compra: sem }; });
    XP.add(20, 'Lista de compras generada');
    renderCocina('compras');
  };
  window.toggleItemCompras = (idx) => {
    State.update(st => { if (st.cocina.lista_compras.items[idx]) st.cocina.lista_compras.items[idx].comprado = !st.cocina.lista_compras.items[idx].comprado; });
    const s2 = State.get();
    const all = s2.cocina.lista_compras.items.every(i => i.comprado);
    if (all) { XP.add(30, 'Lista de compras completada'); UI.confetti(20); UI.toast('Lista completada. +30 XP', 'success'); }
    renderCocina('compras');
  };
  window.limpiarListaCompras = () => {
    State.update(st => { st.cocina.lista_compras = { items: [], semana: '', generada: null }; });
    renderCocina('compras');
  };
}

  render(filtroTipo);

function _renderPlanSemanal(s, recetas, container) {
  const plan = s.cocina.plan_semanal;
  const semanaActual = weekISO();
  const planEsSemanaActual = plan.semana === semanaActual;
  const almIds = plan.almuerzo_ids || [];
  const ceIds = plan.cena_ids || [];
  const rAlmuerzos = almIds.map(id => recetas.find(r => r.id === id)).filter(Boolean);
  const rCenas = ceIds.map(id => recetas.find(r => r.id === id)).filter(Boolean);
  const desIds = plan.desayuno_ids || [];
  const rDesayunos = desIds.map(id => recetas.find(r => r.id === id)).filter(Boolean);
  const rShot = recetas.find(r => r.id === plan.shot_id);
  const targetProt = s.fisico.target_proteina_g || 145;
  const batidosDia = (plan.batidos_dia !== undefined) ? plan.batidos_dia : 1;
  const protBatidos = batidosDia * 24;
  const calBatidos = batidosDia * 120;
  // Proteína promedio diaria: almuerzo avg + cena avg + desayuno avg + batidos
  const protAlm = rAlmuerzos.length ? Math.round(rAlmuerzos.reduce((s,r) => s + r.macros.proteina_g, 0) / rAlmuerzos.length) : 0;
  const protCen = rCenas.length ? Math.round(rCenas.reduce((s,r) => s + r.macros.proteina_g, 0) / rCenas.length) : 0;
  const protDes = rDesayunos.length ? Math.round(rDesayunos.reduce((s,r) => s + r.macros.proteina_g, 0) / rDesayunos.length) : 0;
  const protDia = protAlm + protCen + protDes + protBatidos;
  const calDia = (rAlmuerzos.length ? Math.round(rAlmuerzos.reduce((s,r)=>s+r.macros.calorias,0)/rAlmuerzos.length) : 0) + (rCenas.length ? Math.round(rCenas.reduce((s,r)=>s+r.macros.calorias,0)/rCenas.length) : 0) + (rDesayunos.length ? Math.round(rDesayunos.reduce((s,r)=>s+r.macros.calorias,0)/rDesayunos.length) : 0) + calBatidos;
  const protPct = Math.min(100, Math.round(protDia / targetProt * 100));
  const costSem = rAlmuerzos.reduce((s,r) => s + (r.costo_por_porcion_clp||r.costo_total_clp||0) * (almIds.length===1?5:3), 0) + rCenas.reduce((s,r) => s + (r.costo_por_porcion_clp||r.costo_total_clp||0) * (ceIds.length===1?5:3), 0) + rDesayunos.reduce((s,r) => s + (r.costo_total_clp||0) * (desIds.length===1?5:3), 0) + batidosDia * 600 * 7;
  const hasPlan = rAlmuerzos.length || rCenas.length || rDesayunos.length || rShot;
  // Warnings de proteína
  const excessProt = protDia - targetProt;
  const shortProt = targetProt - protDia;
  let swapHTML = '';
  if (hasPlan && shortProt > 20) {
    const disponibles = recetas.filter(r => (r.tipo==='almuerzo'||r.tipo==='cena') && !almIds.includes(r.id) && !ceIds.includes(r.id)).sort((a,b) => b.macros.proteina_g - a.macros.proteina_g);
    const recomendada = disponibles[0];
    const peor = [...rAlmuerzos,...rCenas].sort((a,b)=>a.macros.proteina_g-b.macros.proteina_g)[0];
    if (recomendada && peor && (recomendada.macros.proteina_g - peor.macros.proteina_g) > 5) {
      swapHTML = `<div style="padding:8px 10px;background:var(--primary-glow);border-radius:var(--r-sm);margin-top:8px"><div class="text-xs" style="color:var(--primary)">💡 Faltan <strong>${shortProt}g</strong> — cambia <em>${esc(peor.nombre)}</em> por <em>${esc(recomendada.nombre)}</em> (+${recomendada.macros.proteina_g - peor.macros.proteina_g}g prot).</div></div>`;
    } else if (batidosDia < 2) {
      swapHTML = `<div style="padding:8px 10px;background:var(--primary-glow);border-radius:var(--r-sm);margin-top:8px"><div class="text-xs" style="color:var(--primary)">💡 Faltan <strong>${shortProt}g</strong> para tu meta. Considera subir a ${batidosDia + 1} batido${batidosDia+1!==1?'s':''} diario${batidosDia+1!==1?'s':''}.</div></div>`;
    }
  }
  let wasteHTML = '';
  if (hasPlan && excessProt > 25) {
    wasteHTML = `<div style="padding:8px 10px;background:#fef3c7;border-radius:var(--r-sm);margin-top:8px"><div class="text-xs" style="color:#92400e">⚠️ <strong>${excessProt}g</strong> sobre tu meta — ese exceso no se asimila, se excreta. ${batidosDia > 0 ? 'Considera bajar a ' + (batidosDia-1) + ' batido' + (batidosDia-1!==1?'s':'') + '.' : 'Considera reemplazar una receta por algo más liviano.'}</div></div>`;
  }

  const renderSlotGrupo = (label, recetasArr, tipo, max) => {
    const porciones = recetasArr.length < 2 ? 5 : 3;
    return `<div class="mb-md">
      <div class="text-xs font-semibold text-lo mb-sm" style="text-transform:uppercase;letter-spacing:.06em">${label} <span style="font-weight:400;color:var(--text-lo)">(hasta ${max}, ${porciones} porciones c/u)</span></div>
      ${recetasArr.map(r => `
        <div class="card mb-sm" style="border:1.5px solid var(--primary);padding:12px 14px">
          <div class="row-between">
            <div>

function _renderListaCompras(s, recetas, container) {
  const lc = s.cocina.lista_compras;
  const plan = s.cocina.plan_semanal;
  if (!lc.items || !lc.items.length) {
    const tieneplan = (plan.almuerzo_ids||[]).length || (plan.cena_ids||[]).length || (plan.desayuno_ids||[]).length || plan.shot_id;
    container.innerHTML = `<div class="section" style="text-align:center;padding:40px 0">
      <div style="font-size:40px;margin-bottom:16px">🛒</div>
      <div class="font-semibold mb-sm">Sin lista generada</div>
      <div class="text-sm text-lo mb-lg">${tieneplan ? 'Tienes recetas en el plan. Genera tu lista.' : 'Primero asigna recetas en "Plan semana".'}</div>
      ${tieneplan ? `<button class="btn btn-primary" onclick="generarListaCompras()">Generar lista de compras</button>` : `<button class="btn btn-secondary" onclick="renderCocina('plan')">Ir al plan →</button>`}
    </div>`;
    return;
  }
  const CATS_LABEL = { proteinas:'🥩 Carnicería y proteínas', verduras:'🥦 Verduras y frutas', lacteos:'🥛 Lácteos y huevos', carbos:'🍚 Granos, pastas y pan', grasas:'🫒 Aceites y grasas', especias:'🧄 Condimentos y especias', extras:'🛍️ Otros' };
  const CATS_RENDER_ORDER = ['proteinas','verduras','lacteos','carbos','grasas','especias','extras'];
  const semCompra = lc.semanas_compra || 1;
  const comprados = lc.items.filter(i => i.comprado).length;
  const total = lc.items.length;
  const pct = Math.round(comprados / total * 100);
  const costoTotal = lc.items.reduce((sum, i) => sum + (i.costo_clp || 0), 0);
  const bycat = {};
  lc.items.forEach(item => {
    const cat = item.cat === 'frutas' ? 'verduras' : (item.cat || 'extras');
    if (!bycat[cat]) bycat[cat] = [];
    bycat[cat].push(item);
  });
  const bycatOrdered = CATS_RENDER_ORDER.filter(c => bycat[c]).map(c => [c, bycat[c]]);
  container.innerHTML = `
    <div>
      <div class="card mb-md" style="background:var(--bg-2)">
        <div class="row-between mb-sm">
          <div class="text-sm font-semibold">Lista ${semCompra > 1 ? semCompra + ' semanas' : 'semanal'}</div>
          <div class="text-sm" style="color:${pct===100?'var(--success)':'var(--text-md)'}">${comprados}/${total} items</div>
        </div>
        <div class="progress-bar mb-sm"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--success)':'var(--primary)'};transition:width .4s"></div></div>
        <div class="row-between mb-sm">
          <div class="text-xs text-lo">Costo estimado total</div>
          <div class="text-sm font-semibold" style="color:var(--success)">~$${costoTotal.toLocaleString('es-CL')}</div>
        </div>
        <div class="row-between">
          <div class="text-xs text-lo">Comprar para</div>
          <div style="display:flex;gap:4px">
            ${[1,2,3,4].map(n => `<button onclick="generarListaCompras(${n})" style="padding:3px 9px;border-radius:var(--r-sm);border:1.5px solid ${semCompra===n?'var(--primary)':'var(--border-strong)'};background:${semCompra===n?'var(--primary-glow)':'transparent'};color:${semCompra===n?'var(--primary)':'var(--text-lo)'};cursor:pointer;font-size:12px;font-weight:${semCompra===n?'600':'400'}">${n}sem</button>`).join('')}
          </div>
        </div>
      </div>
      ${bycatOrdered.map(([cat, items]) => `
        <div class="mb-md">
          <div class="text-xs font-semibold text-lo mb-sm" style="text-transform:uppercase;letter-spacing:.06em">${CATS_LABEL[cat]||cat}</div>
          ${items.map((item, idx) => {
            const globalIdx = lc.items.indexOf(item);
            return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);opacity:${item.comprado?'.45':'1'}">
              <button onclick="toggleItemCompras(${globalIdx})" style="width:22px;height:22px;border-radius:6px;border:2px solid ${item.comprado?'var(--success)':'var(--border-strong)'};background:${item.comprado?'var(--success)':'transparent'};flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center">
                ${item.comprado?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
              </button>
              <div style="flex:1">
                <div class="text-sm ${item.comprado?'':'font-semibold'}" style="${item.comprado?'text-decoration:line-through':''}">${esc(item.item)}</div>
                <div class="text-xs text-lo">${esc(item.cantidad)} · ~$${(item.costo_clp||0).toLocaleString('es-CL')}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      `).join('')}
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-ghost btn-block" onclick="generarListaCompras()">Regenerar</button>
        <button class="btn btn-ghost btn-block" onclick="limpiarListaCompras()" style="color:var(--danger)">Limpiar</button>
      </div>
    </div>`;
}

function applyTheme(t) {
  const html = document.documentElement;
  if (t === 'auto') {
    const pref = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    html.setAttribute('data-theme', pref);
  } else {
    html.setAttribute('data-theme', t);
  }
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = t === 'light' ? '#FAFAF7' : '#0F1419';
}
