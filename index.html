const Notifs = (() => {
  // Programa una notificación a una hora fija de hoy. Si ya pasó, no hace nada.
  function at(hh, mm, title, body, tag) {
    const t = new Date(); t.setHours(hh, mm, 0, 0);
    const ms = t.getTime() - Date.now();
    if (ms <= 0) return;
    setTimeout(() => {
      try { new Notification(title, { body, icon:'./icon-192.png', badge:'./icon-192.png', tag }); } catch(e) {}
    }, Math.min(ms, 2147483647));
  }

  function schedule() {
    const s = State.get();
    if (!s.settings.notificaciones_activas) return;
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const nombre = s.profile.nombre ? `, ${s.profile.nombre}` : '';

    // 🌅 Buenos días
    at(8, 0, 'MI SISTEMA', `Buenos días${nombre}. Arranca con tus hábitos tiny.`, 'buenos-dias');

    // 💊 Vitaminas — después del desayuno
    at(9, 0, 'Vitaminas', '¿Ya las tomaste después del desayuno?', 'vitaminas');

    // 💧 Agua — 8 vasos distribuidos cada ~2h (9:30 a 21:30)
    const aguaHoras = [9,30, 11,30, 13,30, 15,30, 17,0, 18,30, 20,0, 21,30];
    for (let i = 0; i < aguaHoras.length; i += 2) {
      const vaso = i / 2 + 1;
      at(aguaHoras[i], aguaHoras[i+1], '💧 Agua', `Vaso ${vaso} de 8. Registralo en la app.`, `agua-${vaso}`);
    }

    // 📓 Diario — reflexión nocturna (21:00, solo si no hay entrada de noche hoy)
    {
      const t = new Date(); t.setHours(21, 0, 0, 0);
      const ms = t.getTime() - Date.now();
      if (ms > 0) setTimeout(() => {
        const hoyEntry = State.get().journal.find(j => j.fecha === today() && j.tipo === 'daily');
        if (!hoyEntry?.payload?.estado) {
          try { new Notification('📓 Reflexión del día', { body: '¿Qué pasó hoy? 3 preguntas, 2 minutos.', icon:'./icon-192.png', tag:'diario-noche' }); } catch(e) {}
        }
      }, Math.min(ms, 2147483647));
    }

    // 😴 Dormir — 22:00 si no completaste todos los hábitos
    {
      const t = new Date(); t.setHours(22, 0, 0, 0);
      const ms = t.getTime() - Date.now();
      if (ms > 0) setTimeout(() => {
        const allDone = State.get().habits.every(h => h.completions.includes(today()));
        if (!allDone) {
          try { new Notification('😴 Hora de dormir', { body: 'Las 22:00. Cierra el día y ve a la cama.', icon:'./icon-192.png', tag:'bedtime' }); } catch(e) {}
        }
      }, Math.min(ms, 2147483647));
    }

    // 🏋️ Entrenamiento mañana L/M/X — 5:45 despertador + check 8:30 si no lo registraste
    {
      const dia = new Date().getDay(); // 0=dom, 1=lun, 2=mar, 3=mie
      if ([1, 2, 3].includes(dia)) {
        at(5, 45, '🏋️ Hora de entrenar', 'Son las 5:45. Levántate. Entreno 6:00–7:00.', 'entreno-545');
        const tCheck = new Date(); tCheck.setHours(8, 30, 0, 0);
        const msCheck = tCheck.getTime() - Date.now();
        if (msCheck > 0) setTimeout(() => {
          const h3 = State.get().habits.find(h => h.id === 'h3');
          if (h3 && !h3.completions.includes(today())) {
            try { new Notification('🏋️ ¿Ya entrenaste?', { body: 'No hay registro. Si fue tiny, cuenta igual — márcalo.', icon:'./icon-192.png', tag:'entreno-check' }); } catch(e) {}
          }
        }, Math.min(msCheck, 2147483647));
      }
    }

    // 🔄 Comeback — mañana 8am si fallaste hoy
    {
      const t = new Date(); t.setDate(t.getDate()+1); t.setHours(8, 0, 0, 0);
      const ms = t.getTime() - Date.now();
      const fallaste = s.habits.some(h => { const d = new Date(); d.setDate(d.getDate()-1); return !h.completions.includes(dateStr(d)); });
      if (fallaste && ms > 0) setTimeout(() => {
        try { new Notification('MI SISTEMA', { body: 'Ayer se pasó. Hoy está aquí. Versión mínima cuenta.', icon:'./icon-192.png', tag:'comeback' }); } catch(e) {}
      }, Math.min(ms, 2147483647));
    }
  }

  function send(title, body, opts = {}) {
    try { new Notification(title, { body, icon:'./icon-192.png', badge:'./icon-192.png', ...opts }); } catch(e) {}
  }

  return { schedule, send };
})();

/* ═══════════════════════════════════════════════════════════
   APP INIT
═══════════════════════════════════════════════════════════ */
const App = (() => {
  function registerRoutes() {
    Router.register('onboarding', () => renderOnboarding());
    Router.register('fase0', () => renderFase0());
    Router.register('hoy', () => { if (State.get('settings.fase') === 0) { Router.navigate('fase0', false); return; } renderNav(); renderHoy(); });
    Router.register('habitos', () => { renderNav(); renderHabitos(); });
    Router.register('cuerpo', () => { renderNav(); renderCuerpo(); });
    Router.register('resultados', () => { renderNav(); renderResultados(); });
    Router.register('sinergy', () => { renderNav(); renderResultados('sinergy'); });
    Router.register('finanzas', () => { renderNav(); renderResultados('finanzas'); });
    Router.register('diario', () => { renderNav(); renderDiario(); });
    Router.register('yo', () => { renderNav(); renderYo(); });
    Router.register('protocolos', () => { renderNav(); renderProtocolos(); });
    Router.register('protocolo', (hash) => { renderNav(); const id = hash.split('/')[1]; renderProtocolo(id); });
    Router.register('partner', () => { renderNav(); renderPartner(); });
    Router.register('experimentos', () => { renderNav(); renderExperimentos(); });
    Router.register('insights', () => { renderNav(); renderInsights(); });
    Router.register('ajustes', () => { renderNav(); renderAjustes(); });
    Router.register('cocina', () => { renderNav(); renderCocina(); });
    Router.register('crisis', () => renderCrisis());
  }

  function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const next = reg.installing;
        next?.addEventListener('statechange', () => {
          if (next.state === 'installed' && navigator.serviceWorker.controller) {
            UI.toast('Hay una actualización disponible. Cierra y vuelve a abrir la app para aplicarla.', 'info', 12000);
          }
        });
      });
    }).catch(e => console.warn('SW error:', e));
  }

  function checkDailyComebackFlag() {
    const s = State.get();
    const yStr = (() => { const d = new Date(); d.setDate(d.getDate()-1); return dateStr(d); })();
    const failedYesterday = s.habits.some(h => !h.completions.includes(yStr));
    if (failedYesterday && !s.xp.comeback_pendiente) {
      State.set('xp.comeback_pendiente', true);
    }
  }

  function checkInactivity() {
    const s = State.get();
    if (!s.onboarding_done || s.settings.fase < 1) return;
    const diasFuera = diasDesdeUltimaActividad(s);
    if (diasFuera < 3) return;
    const hoy = today();
    if (s.settings.last_inactivity_prompt === hoy) return;
    State.update(st => { st.settings.last_inactivity_prompt = hoy; });

    // Hábito más vale recuperar (mayor longestStreak, desempate por total de completions)
    const best = s.habits.reduce((b, h) => {
      if (!b) return h;
      const bScore = (b.longestStreak||0)*1000 + (b.completions?.length||0);
      const hScore = (h.longestStreak||0)*1000 + (h.completions?.length||0);
      return hScore > bScore ? h : b;
    }, null);

    const habitLine = best ? `
      <div class="card" style="background:var(--bg-2);padding:12px 14px;margin-top:12px;border-radius:var(--r-md);text-align:left">
        <div class="text-xs text-lo font-semibold uppercase mb-sm" style="letter-spacing:.06em">Empieza por aquí</div>
        <div class="font-semibold text-sm">${esc(best.nombre)}</div>
        <div class="text-xs text-lo mt-sm">${esc(best.version_tiny || '')}</div>
        ${best.longestStreak > 0 ? `<div class="text-xs text-primary mt-sm">Tu récord: ${best.longestStreak} días seguidos</div>` : ''}
      </div>` : '';

    UI.modal({
      title: `Llevas ${diasFuera} días fuera.`,
      center: true,
      body: `<div style="text-align:center">
        <p class="text-sm" style="color:var(--text-md);line-height:var(--lh-relaxed)">
          El sistema no te juzga. No importa cuántos días pasaron.<br>Lo único que importa es lo que haces ahora.
        </p>
        ${habitLine}
        <p class="text-xs text-lo" style="margin-top:12px">Un hábito. Hoy. Eso es todo.</p>
      </div>`,
      actions: [
        { label: 'Volver ahora', cls: 'btn-primary btn-block', action: () => Router.navigate('hoy') },
        { label: 'Solo esta semana fue difícil', cls: 'btn-secondary btn-block', action: () => {} },
      ],
    });
  }

  function checkBackupReminder() {
    const s = State.get();
    if (!s.onboarding_done || s.settings.fase < 1) return;
    const last = s.settings.last_backup_reminder;
    const diasDesdeBackup = last
      ? Math.floor((Date.now() - new Date(last + 'T00:00:00').getTime()) / 86400000)
      : 999;
    if (diasDesdeBackup < 30) return;
    State.update(st => { st.settings.last_backup_reminder = today(); });
    setTimeout(() => UI.modal({
      title: '💾 Exporta tu backup',
      center: true,
      body: `<div style="text-align:center">
        <p class="text-sm" style="color:var(--text-md);line-height:var(--lh-relaxed)">
          Llevas más de 30 días usando el sistema.<br>
          Un cambio de dispositivo o un borrado de caché lo pierde todo.<br>
          <strong>30 segundos ahora = meses de datos a salvo.</strong>
        </p>
      </div>`,
      actions: [
        { label: '💾 Exportar ahora', cls: 'btn-primary', action: () => State.exportJSON() },
        { label: 'Ya tengo uno reciente', cls: 'btn-ghost', action: () => {} },
      ],
    }), 2000);
  }

  function init() {
    State.load();
    XP.checkMonthReset();
    checkDailyComebackFlag();
    checkInactivity();
    checkBackupReminder();
    applyTheme(State.get('settings.theme') || 'dark');
    registerRoutes();
    Router.init();
    registerSW();
    Notifs.schedule();
    // Re-schedule al volver a la app (resuelve que setTimeout muere cuando la app está en background)
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') Notifs.schedule(); });
    // Run insights if enough data
    const diasSistema = State.get('settings.fase_start')
      ? Math.floor((Date.now() - new Date(State.get('settings.fase_start')+'T00:00:00').getTime())/86400000)+1 : 0;
    if (diasSistema >= 21) InsightsEngine.generate();
    // Auto theme media listener
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
      if (State.get('settings.theme') === 'auto') applyTheme('auto');
    });
    // Initialize Web Audio on first user gesture
    document.addEventListener('click', () => { UI.playSound && State.get('settings.sonido'); }, { once: true });
  }

  return { init };
})();

// Guardrail global — error JS visible para el usuario, una sola vez por sesión
{
  let _errorShown = false;
  window.onerror = (msg, src, line, col, err) => {
    console.error('App error:', msg, src, line, col, err);
    if (!_errorShown) {
      _errorShown = true;
      setTimeout(() => UI?.toast?.('Algo falló. Si la app se ve rara, recarga la página.', 'warn', 8000), 0);
    }
  };
  window.addEventListener('unhandledrejection', e => {
    console.error('Unhandled promise rejection:', e.reason);
    if (!_errorShown) {
      _errorShown = true;
      setTimeout(() => UI?.toast?.('Algo falló. Si la app se ve rara, recarga la página.', 'warn', 8000), 0);
    }
  });
}

// Esperar a que Chart.js cargue (async), luego arrancar
if (typeof Chart !== 'undefined') {
  App.init();
} else {
  const chartScript = document.querySelector('script[src*="chart.js"]');
  if (chartScript) {
    chartScript.addEventListener('load', () => App.init());
    chartScript.addEventListener('error', () => App.init()); // arrancar igual si falla CDN
  } else {
    App.init();
  }
}
</script>
</body>
</html>
